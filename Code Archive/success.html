<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed — The Saju Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.45);
  --navy: #0b0f1e; --navy-card: #131929;
  --text: #e8dfc8; --text-dim: rgba(232,223,200,0.65);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--navy); color:var(--text); font-family:'EB Garamond',serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:#fff; border-radius:50%;
  animation:twinkle var(--d,4s) var(--delay,0s) infinite alternate; opacity:var(--bright,0.3); }
@keyframes twinkle { from{opacity:var(--bright,0.3)} to{opacity:0.05} }
.wrap { position:relative; z-index:1; width:100%; max-width:480px; text-align:center; }
.brand { font-size:12px; letter-spacing:4px; color:var(--gold); margin-bottom:48px; }
.card { background:var(--navy-card); border:1px solid var(--gold-dim); padding:48px 40px; }
.icon { font-size:40px; margin-bottom:24px; }
h1 { font-size:clamp(22px,5vw,28px); font-weight:500; margin-bottom:12px; }
.subtitle { font-size:17px; color:var(--text-dim); line-height:1.6; margin-bottom:32px; }
.redirecting { font-size:13px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; }
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="brand">✦ The Saju Blueprint ✦</div>
  <div class="card">
    <div class="icon">✦</div>
    <h1>Payment Confirmed</h1>
    <p class="subtitle">Your order has been received.<br>Preparing your reading now...</p>
    <p class="redirecting">Reading your chart...</p>
  </div>
</div>
<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random()*2+0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:-${Math.random()*8}s;--bright:${0.2+Math.random()*0.5}`;
  starsEl.appendChild(s);
}

// transaction ID를 sessionStorage에 저장 후 generating으로 이동
const params = new URLSearchParams(window.location.search);
const txnId = params.get('_ptxn');
if (txnId) {
  sessionStorage.setItem('paddle_txn_id', txnId);
}

setTimeout(() => {
  window.location.href = '/generating';
}, 2000);
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
