<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주 랭킹 분석 — 예시 리포트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#E8547A;--pink-light:#F9E4EA;--pink-dark:#C23A60;--deep:#1A0A12;--text:#2D1420;--text-muted:#7A5060;--text-hint:#B08090;--surface:#FFFFFF;--surface-2:#FDF5F7;--border:rgba(232,84,122,0.12);--border-strong:rgba(232,84,122,0.28);--radius:16px;--radius-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#FDF5F7;color:var(--text);min-height:100vh;}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 20px 60px;}
.result-hero{text-align:center;padding:8px 0 24px;}
.result-hero .pill{display:inline-flex;align-items:center;gap:6px;background:var(--pink-light);color:var(--pink-dark);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;margin-bottom:16px;}
.result-hero h1{font-family:'Nanum Myeongjo',serif;font-size:26px;font-weight:700;color:var(--deep);margin-bottom:6px;}
.result-hero p{font-size:14px;color:var(--text-muted);}
.winner-card{background:linear-gradient(135deg,#FFF5F8 0%,#FDE8EE 100%);border:1px solid var(--border-strong);border-radius:var(--radius);padding:24px 20px;text-align:center;margin-bottom:16px;}
.winner-crown{font-size:36px;margin-bottom:8px;}
.winner-name{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:700;color:var(--pink-dark);margin-bottom:6px;}
.winner-arch{font-size:13px;color:var(--pink);font-weight:600;margin-bottom:10px;}
.winner-comment{font-size:14px;color:var(--text-muted);line-height:1.7;}
.ranking-comment{background:var(--pink-light);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;font-size:13px;color:var(--pink-dark);line-height:1.7;}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;}
.rank-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.rank-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.r1{background:#FEF3C7;color:#92400E;}.r2{background:#F1F5F9;color:#475569;}.r3{background:#FEF3E8;color:#9A3412;}.r4{background:#F0FDF4;color:#166534;}
.rank-name{font-size:15px;font-weight:600;color:var(--text);}
.rank-label{font-size:11px;color:var(--pink);font-weight:600;margin-top:1px;}
.rank-score{margin-left:auto;font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.rank-score span{font-size:11px;color:var(--text-hint);font-weight:400;}
.score-bar{height:5px;background:var(--pink-light);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.score-fill{height:100%;border-radius:3px;}
.mini-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mini-emoji{font-size:13px;width:20px;text-align:center;}
.mini-label{font-size:11px;color:var(--text-muted);width:88px;flex-shrink:0;}
.mini-track{flex:1;height:4px;background:var(--pink-light);border-radius:2px;overflow:hidden;}
.mini-fill{height:100%;border-radius:2px;}
.mini-num{font-size:11px;color:var(--text-muted);width:24px;text-align:right;}
.detail-toggle{width:100%;background:none;border:1px solid var(--border-strong);border-radius:8px;padding:9px;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:'Pretendard',sans-serif;margin:12px 0 2px;}
.detail{display:none;padding-top:14px;}
.detail.open{display:block;}
.detail-sec{margin-bottom:14px;}
.detail-sec-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}
.detail-sec-text{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:6px;}
.detail-sec-summary{font-size:12px;color:var(--pink-dark);font-weight:500;padding:8px 12px;background:var(--pink-light);border-radius:8px;}
.detail-overall{font-size:13px;color:var(--text-muted);line-height:1.7;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;}
.flow{text-align:center;font-size:11px;color:var(--text-hint);padding:18px 0 0;line-height:1.9;}
.disclaimer{text-align:center;font-size:11px;color:var(--text-hint);padding:20px 0 0;line-height:1.8;}
</style>
</head>

function render(data){
  const wrap=document.getElementById('result-wrap');
  const sorted=[...data.results].sort((a,b)=>b.scores.total-a.scores.total);
  const w=sorted[0];
  let html=`<div class="result-hero"><div class="pill">✨ 분석 완료</div><h1>결과 나왔어요 👀</h1><p>사주가 말해주는 진짜 궁합</p></div>
  <div class="winner-card"><div class="winner-crown">👑</div><div class="winner-name">${w.name}</div><div class="winner-arch">${w.archetype}</div><p class="winner-comment">${w.overall}</p></div>
  <div class="ranking-comment">📊 ${data.ranking_comment}</div>`;
  sorted.forEach((r,i)=>{
    const t=Math.round(r.scores.total),s=r.scores;
    const mini=Object.entries(SECTION_LABELS).map(([k,m])=>`<div class="mini-row"><span class="mini-emoji">${m.emoji}</span><span class="mini-label">${m.label}</span><div class="mini-track"><div class="mini-fill" style="width:${s[k]}%;background:${barColors[i]};"></div></div><span class="mini-num">${Math.round(s[k])}</span></div>`).join('');
    const det=Object.entries(SECTION_LABELS).map(([k,m])=>{const sec=r.sections[k];return `<div class="detail-sec"><div class="detail-sec-title">${m.emoji} ${m.label}</div><p class="detail-sec-text">${sec.text}</p><div class="detail-sec-summary">${sec.summary}</div></div>`;}).join('');
    html+=`<div class="rank-card"><div class="rank-header"><div class="rank-badge ${rankClass[i]}">${rankEmoji[i]}</div><div><div class="rank-name">${r.name}</div><div class="rank-label">${r.archetype}</div></div><div class="rank-score">${t}<span>/100</span></div></div>
    <div class="score-bar"><div class="score-fill" style="width:${t}%;background:${barColors[i]};"></div></div>
    <div>${mini}</div>
    <button class="detail-toggle" onclick="(function(b){var d=b.nextElementSibling;var o=d.classList.toggle('open');b.textContent=o?'상세 분석 닫기 ▴':'상세 분석 보기 ▾';})(this)">상세 분석 보기 ▾</button>
    <div class="detail">${det}<div class="detail-overall">${r.overall}</div></div></div>`;
  });
  html+=`<div class="flow">🔮 2026 병오(火火) · 2027 정미(火土) · 2028 무신(土金) · 2029 기유(土金) · 2030 경술(金土)<br>2031 신해(金水) · 2032 임자(水水) · 2033 계축(水土) · 2034 갑인(木木) · 2035 을묘(木木)</div>
  <div class="disclaimer">재미로 보는 사주 분석이에요. 참고만 하세요 🙏<br>예시 리포트 · 광고용</div>`;
  wrap.innerHTML=html;
}
render(DATA);
