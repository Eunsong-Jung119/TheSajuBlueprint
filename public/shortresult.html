<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18045718869"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Saju Reading · The Saju Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<!-- Whop SDK -->
<script async defer src="https://js.whop.com/static/checkout/loader.js"></script>
<style>
:root {
  --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.35); --gold-faint:rgba(201,168,76,0.08);
  --navy:#090d1a; --navy-card:#0f1526;
  --text:#e8dfc8; --text-dim:rgba(232,223,200,0.65); --text-faint:rgba(232,223,200,0.35);
  --water:#4a90d9; --fire:#e05c2a; --wood:#4a9e5c; --soil:#b5813e; --metal:#8899bb;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--text);font-family:'EB Garamond',serif;min-height:100vh;overflow-x:hidden;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:var(--bright);transform:scale(1)}}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 20px 80px;}
.site-header{text-align:center;padding:48px 0 32px;border-bottom:1px solid var(--gold-dim);margin-bottom:48px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:5px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;}
.site-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,42px);font-weight:300;color:var(--gold);letter-spacing:2px;}
.site-subtitle{font-size:13px;color:var(--text-faint);letter-spacing:1px;margin-top:8px;}

/* ── FEEDBACK ── */
.feedback-section{margin-top:48px;padding:28px 32px;background:var(--navy-card);border:1px solid rgba(255,255,255,0.05);border-radius:16px;text-align:center;}
.feedback-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin-bottom:6px;}
.feedback-sub{font-size:14px;color:var(--text-faint);margin-bottom:16px;line-height:1.6;}
.feedback-textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);color:var(--text);font-family:'EB Garamond',serif;font-size:15px;padding:12px 16px;resize:vertical;min-height:90px;outline:none;border-radius:4px;margin-bottom:12px;}
.feedback-textarea:focus{border-color:var(--gold-dim);}
.feedback-submit{background:transparent;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'EB Garamond',serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:10px 28px;cursor:pointer;transition:all 0.2s;border-radius:2px;}
.feedback-submit:hover{border-color:var(--gold);color:var(--gold);}
.feedback-thanks{display:none;font-size:14px;color:var(--gold-dim);margin-top:12px;letter-spacing:1px;}

/* ── SHARE BAR ── */
.share-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:12px;background:rgba(9,13,26,0.92);backdrop-filter:blur(12px);border:1px solid rgba(201,168,76,0.2);padding:12px 24px;z-index:100;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;white-space:nowrap;border-radius:2px;animation:fadeUp 0.4s ease;}
.share-bar.visible{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.share-btn{padding:8px 20px;border:1px solid var(--gold);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:transparent;cursor:pointer;transition:all 0.2s;border-radius:2px;}
.share-btn:hover{background:var(--gold);color:var(--navy);}
.share-copied{color:var(--gold);font-size:12px;letter-spacing:1px;}
#loadingState{text-align:center;padding:80px 20px;}
.loading-spinner{width:40px;height:40px;border:2px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;color:var(--text-faint);letter-spacing:1px;}
#errorState{display:none;text-align:center;padding:80px 20px;}
#reportContent{display:none;animation:fadeIn 0.6s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.report-title{text-align:center;margin-bottom:48px;}
.report-name{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:12px;}
.report-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,34px);font-weight:400;color:var(--text);line-height:1.4;margin-bottom:8px;}
.report-summary{font-size:16px;color:var(--text-dim);line-height:1.7;max-width:560px;margin:0 auto;}
.manse-section{margin-bottom:48px;}
.manse-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:20px;text-align:center;}
.pillars-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.pillar-card{background:var(--navy-card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px 12px;text-align:center;}
.pillar-card-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:12px;}
.elem-block{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:8px;}
.elem-block:last-child{margin-bottom:0;}
.elem-icon{font-size:22px;line-height:1;}
.elem-name{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.elem-sep{width:20px;height:1px;background:rgba(255,255,255,0.08);margin:4px auto;}
.elem-Water .elem-name{color:var(--water);}
.elem-Fire .elem-name{color:var(--fire);}
.elem-Wood .elem-name{color:var(--wood);}
.elem-Soil .elem-name{color:var(--soil);}
.elem-Metal .elem-name{color:var(--metal);}
.elem-balance{background:var(--navy-card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;}
.balance-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;}
.balance-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.balance-row:last-child{margin-bottom:0;}
.balance-elem-name{font-size:12px;letter-spacing:1px;text-transform:uppercase;width:52px;flex-shrink:0;}
.balance-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.balance-bar{height:100%;border-radius:3px;transition:width 0.6s ease;}
.balance-count{font-size:12px;color:var(--text-faint);width:16px;text-align:right;flex-shrink:0;}
.missing-tag{font-size:11px;letter-spacing:1px;color:rgba(232,223,200,0.3);background:rgba(255,255,255,0.04);border-radius:4px;padding:2px 8px;}
.section-divider{text-align:center;padding:16px 0;color:var(--gold-dim);font-size:16px;letter-spacing:8px;}
.section{margin-bottom:40px;padding:28px 32px;background:var(--navy-card);border:1px solid rgba(255,255,255,0.05);border-radius:16px;}
.section-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-tag::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
.section-body{font-size:16.5px;line-height:1.85;color:var(--text);}
.section-body p{margin-bottom:16px;}
.section-body p:last-child{margin-bottom:0;}
.alignment-section{margin-bottom:40px;padding:24px 32px;background:var(--gold-faint);border:1px solid var(--gold-dim);border-radius:16px;}
.alignment-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px;}
.align-item{display:flex;flex-direction:column;gap:4px;}
.align-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);}
.align-value{font-size:15px;color:var(--text);}
.color-dots{display:flex;gap:6px;margin-top:4px;}
.color-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);}

/* ── PAYGATE ── */
.paygate-wrapper{position:relative;margin-top:8px;}
.paygate-blur{filter:blur(3px);pointer-events:none;user-select:none;opacity:0.4;}

/* CTA floats ABOVE the blur */
.paygate-cta{
  position:relative;
  z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 24px 32px;text-align:center;
  /* fade from navy into the blur below */
  background:linear-gradient(to bottom, var(--navy) 0%, var(--navy) 60%, rgba(9,13,26,0) 100%);
  margin-bottom:-40px; /* overlap slightly into the blur */
}
.paygate-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,4vw,28px);color:var(--text);margin-bottom:8px;font-weight:400;}
.paygate-sub{font-size:15px;color:var(--text-dim);margin-bottom:24px;line-height:1.6;max-width:400px;}
.paygate-price{font-family:'Cormorant Garamond',serif;font-size:42px;color:var(--gold);font-weight:400;margin-bottom:4px;}
.paygate-note{font-size:13px;color:var(--text-faint);margin-bottom:24px;}
.paygate-btn{background:var(--gold);border:none;color:var(--navy);font-family:'EB Garamond',serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;padding:16px 40px;cursor:pointer;font-weight:600;transition:background 0.2s;}
.paygate-btn:hover{background:#d4b060;}
.paygate-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* ── WHOP MODAL ── */
.whop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.whop-overlay.visible{display:flex;}
.whop-modal{position:relative;width:min(540px,96vw);max-height:90vh;background:#0f1526;border:1px solid var(--gold-dim);display:flex;flex-direction:column;overflow:hidden;border-radius:4px;}
.whop-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(201,168,76,0.15);flex-shrink:0;}
.whop-modal-title{font-size:13px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.whop-modal-close{background:none;border:none;color:var(--text-faint);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.whop-modal-close:hover{color:var(--text);}
.whop-modal-body{flex:1;overflow-y:auto;padding:16px;min-height:480px;display:flex;align-items:flex-start;justify-content:center;}

/* Whop SDK div sizing */
#whopCheckoutDiv{width:100%;min-height:460px;}

/* Loading state inside modal */
.modal-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text-faint);font-size:14px;letter-spacing:1px;}

@media(max-width:480px){
  .pillars-grid{grid-template-columns:repeat(2,1fr);}
  .section{padding:20px;}
  .alignment-grid{grid-template-columns:1fr;}
  .paygate-cta{padding:32px 16px 24px;}
}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <header class="site-header">
    <div class="brand">✦ The Saju Blueprint ✦</div>
    <div class="site-title" id="siteTitle">Your Reading</div>
    <div class="site-subtitle" id="siteSubtitle"></div>
  </header>
  <div id="loadingState">
    <div class="loading-spinner"></div>
    <div class="loading-text">Reading your chart…</div>
  </div>
  <div id="errorState">
    <p style="color:var(--text-dim);margin-bottom:16px">Something went wrong loading your reading.</p>
    <a href="/order" style="color:var(--gold)">Try again →</a>
  </div>
  <div id="reportContent"></div>
</div>

<!-- Whop modal -->
<div class="whop-overlay" id="whopOverlay" onclick="handleOverlayClick(event)">
  <div class="whop-modal">
    <div class="whop-modal-header">
      <span class="whop-modal-title">✦ Unlock Full Reading · $4.99</span>
      <button class="whop-modal-close" onclick="closeWhopModal()">×</button>
    </div>
    <div class="whop-modal-body">
      <div class="modal-loading" id="modalLoading">
        <div class="loading-spinner"></div>
        <span>Loading checkout…</span>
      </div>
      <!-- Whop SDK injects checkout here -->
      <div
        id="whopCheckoutDiv"
        data-whop-checkout-plan-id="plan_VegawRTWadrLi"
        data-whop-checkout-theme="dark"
        data-whop-checkout-on-complete="onCheckoutComplete"
        data-whop-checkout-style-container-padding-x="0"
        style="display:none;"
      ></div>
    </div>
  </div>
</div>

<!-- Share bar (fixed bottom) -->
<div class="share-bar" id="shareBar">
  <span>Share your reading</span>
  <button class="share-btn" id="shareBtn" onclick="copyShareLink()">↗ Copy Link</button>
</div>

<script>
// ── Event logging ──────────────────────────────────────────────────────
async function trackEvent(eventName, metadata = {}) {
  const p = new URLSearchParams(window.location.search);
  try {
    await fetch('/api/track', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        event: eventName,
        metadata: {
          ...metadata,
          source:   p.get('utm_source')   || 'direct',
          medium:   p.get('utm_medium')   || 'none',
          campaign: p.get('utm_campaign') || 'none',
          referrer: document.referrer     || 'none',
        }
      })
    });
  } catch(e) {}
}

// ── stars ──────────────────────────────────────────────────────────────
const starsEl=document.getElementById('stars');
for(let i=0;i<50;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:-${Math.random()*8}s;--bright:${0.1+Math.random()*0.3}`;
  starsEl.appendChild(s);
}

// ── constants ─────────────────────────────────────────────────────────
const ELEM_EMOJI={Water:'💧',Fire:'🔥',Wood:'🌳',Soil:'🪨',Metal:'⚔️'};
const ELEM_COLOR={Water:'#4a90d9',Fire:'#e05c2a',Wood:'#4a9e5c',Soil:'#b5813e',Metal:'#8899bb'};
const COLOR_MAP={black:'#1a1a1a',navy:'#0f1a3a','deep blue':'#1a2a5e',white:'#f5f0e8',green:'#2d5a3d','deep green':'#1a3d2a',red:'#8b2020',gold:'#c9a84c',silver:'#8899bb',gray:'#555',blue:'#2a4a7a',brown:'#6b4226',charcoal:'#3a3a3a'};

function getColorHex(name){
  const l=name.toLowerCase();
  for(const[k,v]of Object.entries(COLOR_MAP)){if(l.includes(k))return v;}
  return '#555';
}

// ── buildReport ────────────────────────────────────────────────────────
function buildReport(data,isPaid){
  const{report,pillars,elemCount,missing}=data;
  const totalElems=Object.values(elemCount).reduce((a,b)=>a+b,0);
  let pillarsHTML='';
  (pillars||[]).forEach(p=>{
    pillarsHTML+=`<div class="pillar-card"><div class="pillar-card-label">${p.label}</div><div class="elem-block elem-${p.stem}"><div class="elem-icon">${ELEM_EMOJI[p.stem]||'✦'}</div><div class="elem-name">${p.stem}</div></div><div class="elem-sep"></div><div class="elem-block elem-${p.branch}"><div class="elem-icon">${ELEM_EMOJI[p.branch]||'✦'}</div><div class="elem-name">${p.branch}</div></div></div>`;
  });
  const elems=['Water','Fire','Wood','Soil','Metal'];
  let barsHTML='';
  elems.forEach(e=>{
    const count=elemCount[e]||0;
    const pct=totalElems?Math.round((count/totalElems)*100):0;
    const isMissing=count===0;
    barsHTML+=`<div class="balance-row${isMissing?' missing':''}"><div class="balance-elem-name" style="color:${isMissing?'rgba(232,223,200,0.25)':ELEM_COLOR[e]}">${e}</div><div class="balance-bar-wrap"><div class="balance-bar" style="width:${pct}%;background:${ELEM_COLOR[e]};opacity:${isMissing?0.15:1}"></div></div><div class="balance-count">${count||'—'}</div>${isMissing?'<span class="missing-tag">missing</span>':''}</div>`;
  });

  // Section 1 — always visible
  const rt=report.realTalk||'';
  const rtParas=rt.split(/\n\n+/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${p}</p>`).join('');
  const section1=`<div class="section"><div class="section-tag">Who You Actually Are</div><div class="section-body">${rtParas}</div></div>`;

  // Sections 2-5 + alignment — gated
  const gatedSections=[
    {key:'rightNow',tag:"What's Alive Right Now"},
    {key:'blindspot',tag:'The Pattern You Keep Repeating'},
    {key:'whatYouNeed',tag:'What You Actually Need'},
    {key:'lastWords',tag:'Before You Go'},
  ];
  let gatedHTML='';
  gatedSections.forEach(s=>{
    const text=report[s.key]||'';
    const paras=text.split(/\n\n+/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${p}</p>`).join('');
    gatedHTML+=`<div class="section"><div class="section-tag">${s.tag}</div><div class="section-body">${paras}</div></div>`;
  });
  const al=report.alignment||{};
  const colors=Array.isArray(al.colors)?al.colors:[al.colors||'navy'];
  const dotsHTML=colors.map(c=>`<div class="color-dot" style="background:${getColorHex(c)}" title="${c}"></div>`).join('');
  gatedHTML+=`<div class="alignment-section"><div class="section-tag">Alignment</div><div class="alignment-grid"><div class="align-item"><div class="align-label">Colors</div><div class="color-dots">${dotsHTML}</div><div class="align-value" style="margin-top:4px">${colors.join(', ')}</div></div><div class="align-item"><div class="align-label">Direction</div><div class="align-value">${al.direction||'—'}</div></div><div class="align-item" style="grid-column:1/-1"><div class="align-label">Daily Habit</div><div class="align-value">${al.habit||'—'}</div></div></div></div>`;

  const gatedBlock = isPaid ? gatedHTML : `
    <!-- CTA sits ABOVE the blur -->
    <div class="paygate-cta">
      <div class="paygate-title">Your full reading is ready.</div>
      <div class="paygate-sub">Unlock your blind spot, what's actually happening in your life right now, and what you actually need.</div>
      <div class="paygate-price">$4.99</div>
      <div class="paygate-note">One-time · Instant access · No subscription</div>
      <button class="paygate-btn" id="unlockBtn" onclick="openWhopModal()">✦ Unlock Full Reading</button>
    </div>
    <!-- Blurred preview below -->
    <div class="paygate-wrapper">
      <div class="paygate-blur">${gatedHTML}</div>
    </div>`;

  const feedbackSection = isPaid ? `
  <div class="feedback-section" id="feedbackSection">
    <div class="feedback-title">How did this feel?</div>
    <div class="feedback-sub">Your honest reaction helps us improve. Takes 30 seconds.</div>
    <textarea class="feedback-textarea" id="feedbackText" placeholder="What resonated? What felt off? Anything you'd add…"></textarea>
    <button class="feedback-submit" onclick="submitFeedback()">Send Feedback</button>
    <div class="feedback-thanks" id="feedbackThanks">✦ Thank you — your feedback means a lot.</div>
  </div>` : '';

  return `
  <div class="report-title">
    <div class="report-name">✦ Your Saju Reading ✦</div>
    <div class="report-headline">${report.title||''}</div>
    <p class="report-summary">${report.visualSummary||''}</p>
  </div>
  <div class="manse-section">
    <div class="manse-label">Your Four Pillars</div>
    <div class="pillars-grid">${pillarsHTML}</div>
    <div class="elem-balance"><div class="balance-title">Element Balance</div>${barsHTML}</div>
  </div>
  <div class="section-divider">· · ·</div>
  ${section1}
  ${gatedBlock}
  ${feedbackSection}`;
}

// ── Whop SDK callback ─────────────────────────────────────────────────
window.onCheckoutComplete = async function(planId, receiptId) {
  console.log('Whop checkout complete', planId, receiptId);
  closeWhopModal();

  const cached = window._reportData;
  if (!cached) return;

  sessionStorage.setItem('short_report_token', receiptId || 'paid');
  trackEvent('payment_completed', { plan_id: planId, receipt_id: receiptId });
  // Google Ads 전환 추적
  gtag('event', 'conversion', {
    'send_to': 'AW-18045718869',
    'value': 4.99,
    'currency': 'USD',
    'transaction_id': receiptId
  });

  // 결제 완료 시점에 리포트 저장 + shareUrl 생성
  try {
    const birth = JSON.parse(sessionStorage.getItem('saju_birth') || '{}');
    const res = await fetch('/api/save-short-report', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        reportData: cached,
        birth,
        email: birth.email || null,
      })
    });
    const d = await res.json();
    if (d.shareId) {
      _shareUrl = `${location.origin}/shortresult?id=${d.shareId}`;
    }
  } catch(e) {
    console.error('save-short-report failed:', e);
  }

  const rc = document.getElementById('reportContent');
  rc.innerHTML = buildReport(cached, true);
  rc.scrollIntoView({behavior:'smooth', block:'start'});
  document.getElementById('shareBar').classList.add('visible');
};

// ── Modal open/close ───────────────────────────────────────────────────
let sdkInitialized = false;

async function openWhopModal() {
  trackEvent('unlock_clicked');
  const btn = document.getElementById('unlockBtn');
  if (btn) { btn.textContent = 'Loading…'; btn.disabled = true; }

  document.getElementById('whopOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';

  // Show loading, hide checkout div until SDK is ready
  document.getElementById('modalLoading').style.display = 'flex';
  document.getElementById('whopCheckoutDiv').style.display = 'none';

  // Give SDK a tick to render; if it already has, show immediately
  setTimeout(() => {
    document.getElementById('modalLoading').style.display = 'none';
    document.getElementById('whopCheckoutDiv').style.display = 'block';
    // Re-init SDK if needed (SDK auto-scans DOM on load, but on dynamic show we nudge it)
    if (window.WhopSDK && window.WhopSDK.init) {
      window.WhopSDK.init();
    }
  }, 600);

  if (btn) { btn.textContent = '✦ Unlock Full Reading'; btn.disabled = false; }
}

function closeWhopModal() {
  document.getElementById('whopOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('whopOverlay')) closeWhopModal();
}

// ── fallback: 모달 닫을 때 paid 상태면 unlock ─────────────────────────
// onCheckoutComplete 안 터지는 경우 대비 — 모달 닫기 버튼에 체크 추가
function closeWhopModal() {
  document.getElementById('whopOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('whopOverlay')) closeWhopModal();
}

// ── Share link ─────────────────────────────────────────────────────────
let _shareUrl = null;

async function copyShareLink() {
  const btn = document.getElementById('shareBtn');
  trackEvent('share_clicked');

  // 결제 시점에 이미 생성된 URL 있으면 바로 복사
  if (_shareUrl) {
    _doCopy(_shareUrl, btn);
    return;
  }

  // _shareUrl 없으면 저장 (이메일 발송 없이 shareId만 생성)
  btn.textContent = 'Saving…';
  btn.disabled = true;
  try {
    const birth = JSON.parse(sessionStorage.getItem('saju_birth') || '{}');
    const res = await fetch('/api/save-short-report', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        reportData: window._reportData,
        birth,
        email: null, // copyShareLink에서는 이메일 발송 안 함 (결제 시점에 이미 발송)
      })
    });
    const d = await res.json();
    if (!d.shareId) throw new Error('No shareId');
    _shareUrl = `${location.origin}/shortresult?id=${d.shareId}`;
    _doCopy(_shareUrl, btn);
  } catch(e) {
    _doCopy(location.href, btn);
  } finally {
    btn.disabled = false;
  }
}

function _doCopy(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '↗ Copy Link'; }, 2500);
  }).catch(() => {
    prompt('Copy this link:', url);
    btn.textContent = '↗ Copy Link';
  });
}

// ── Feedback ──────────────────────────────────────────────────────────
async function submitFeedback() {
  const text = document.getElementById('feedbackText')?.value?.trim();
  if (!text) return;
  const btn = document.querySelector('.feedback-submit');
  btn.textContent = 'Sending…';
  btn.disabled = true;
  try {
    await fetch('/api/feedback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text, page: 'short_report' })
    });
  } catch(e) {}
  btn.style.display = 'none';
  document.getElementById('feedbackThanks').style.display = 'block';
  document.getElementById('feedbackText').style.display = 'none';
}

// ── Update header with name + birthdate ───────────────────────────────
function updateHeader(birth) {
  if (!birth) return;
  const name = birth.name;
  const date = birth.date; // e.g. "1997-10-29"
  if (name) {
    document.getElementById('siteTitle').textContent = name + "'s Reading";
  }
  if (date) {
    // Format: Oct 29, 1997
    const d = new Date(date + 'T12:00:00');
    const formatted = d.toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'});
    const time = birth.time ? ' · ' + birth.time : '';
    document.getElementById('siteSubtitle').textContent = formatted + time;
  }
}

// ── loadReport ─────────────────────────────────────────────────────────
async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const shareId = params.get('id');

  // ── ?id= 로 접근 → Supabase에서 불러오기 (paid 확정)
  if (shareId) {
    try {
      const res = await fetch('/api/get-short-report?id=' + shareId);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      window._reportData = data.reportData;
      // shareId 접근 시 _shareUrl도 세팅 (copy link 바로 가능)
      _shareUrl = `${location.origin}/shortresult?id=${shareId}`;
      updateHeader(data.birth);
      document.getElementById('loadingState').style.display = 'none';
      const rc = document.getElementById('reportContent');
      rc.innerHTML = buildReport(data.reportData, true);
      rc.style.display = 'block';
      document.getElementById('shareBar').classList.add('visible');
    } catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
    return;
  }

  // ── dev mode (?date= 파라미터)
  const devDate = params.get('date');
  if (devDate) {
    const birth = {date:devDate, time:params.get('time')||'12:00', gender:params.get('gender')||'Female', name:params.get('name')||'', timezone:params.get('timezone')||'America/New_York'};
    try {
      const res = await fetch('/api/short-report', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(birth)});
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      window._reportData = data;
      updateHeader(birth);
      trackEvent('short_result_viewed', { is_paid: false });
      document.getElementById('loadingState').style.display = 'none';
      const rc = document.getElementById('reportContent');
      rc.innerHTML = buildReport(data, false);
      rc.style.display = 'block';
    } catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
    return;
  }

  // ── 일반 퍼널: sessionStorage에서 birth 읽어서 리포트 생성 (unpaid)
  const birthRaw = sessionStorage.getItem('saju_birth');
  if (birthRaw) {
    try {
      const birth = JSON.parse(birthRaw);
      const res = await fetch('/api/short-report', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(birth)});
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      window._reportData = data;
      updateHeader(birth);
      trackEvent('short_result_viewed', { is_paid: false });
      document.getElementById('loadingState').style.display = 'none';
      const rc = document.getElementById('reportContent');
      rc.innerHTML = buildReport(data, false); // 항상 unpaid로 렌더 — 결제는 onCheckoutComplete에서 처리
      rc.style.display = 'block';
    } catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
    return;
  }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

loadReport();
</script>
