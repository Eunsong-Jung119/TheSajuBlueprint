<style>
:root {

.feedback-section{margin-top:16px;padding:28px 32px;background:var(--navy-card);border:1px solid rgba(255,255,255,0.05);border-radius:16px;text-align:center;}

<script>
function getSessionId(){let sid=localStorage.getItem('saju_sid');if(!sid){sid=crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now();localStorage.setItem('saju_sid',sid);}return sid;}
async function trackEvent(eventName,metadata={}){
  const p=new URLSearchParams(window.location.search);
  try{
    await fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      event:eventName,
      metadata:{...metadata,session_id:getSessionId(),source:p.get('utm_source')||'direct',medium:p.get('utm_medium')||'none',campaign:p.get('utm_campaign')||'none',referrer:document.referrer||'none'}
    })});
  }catch(e){}
}

const starsEl=document.getElementById('stars');
for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.5+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:-${Math.random()*8}s;--bright:${0.1+Math.random()*0.3}`;starsEl.appendChild(s);}

const TG_ELEM_SR=['Wood','Wood','Fire','Fire','Earth','Earth','Metal','Metal','Water','Water'];
const DZ_ELEM_SR=['Water','Earth','Wood','Wood','Earth','Fire','Fire','Earth','Metal','Metal','Earth','Water'];
const PILLAR_LABELS=['Year','Month','Day · Core Self','Hour'];

const DAY_MASTER_ELEM={
  0:'Yang Wood',1:'Yin Wood',2:'Yang Fire',3:'Yin Fire',4:'Yang Earth',
  5:'Yin Earth',6:'Yang Metal',7:'Yin Metal',8:'Yang Water',9:'Yin Water'
};

const TG_YY=['Yang','Yin','Yang','Yin','Yang','Yin','Yang','Yin','Yang','Yin'];
const DZ_MAIN_TG_SR=[9,5,0,1,4,2,3,5,6,7,4,8];

const STEM_SR={
  Wood:{Yang:{icon:'🌳',name:'Yang Wood',desc:'Upward reaching, unyielding growth'},Yin:{icon:'🌿',name:'Yin Wood',desc:'Flexible, quietly resilient'}},
  Fire:{Yang:{icon:'🔆',name:'Yang Fire',desc:'Radiant, expansive, illuminating'},Yin:{icon:'🕯️',name:'Yin Fire',desc:'Candlelight warmth, subtle intensity'}},
  Earth:{Yang:{icon:'⛰️',name:'Yang Earth',desc:'Solid, enduring, vast foundation'},Yin:{icon:'🌾',name:'Yin Earth',desc:'Nourishing, fertile, receptive ground'}},
  Metal:{Yang:{icon:'⚔️',name:'Yang Metal',desc:'Sharp, decisive, forged under pressure'},Yin:{icon:'💎',name:'Yin Metal',desc:'Refined, precise, brilliantly polished'}},
  Water:{Yang:{icon:'🌊',name:'Yang Water',desc:'Vast, unstoppable, deep current'},Yin:{icon:'💧',name:'Yin Water',desc:'Still depth, intuitive, absorbing wisdom'}},
};

const BRANCH_SR=[
  {icon:'🐀',name:'Water · Rat',desc:'Quick to adapt, moves with changing currents and opportunities'},
  {icon:'🐂',name:'Earth · Ox',desc:'Endures pressure, builds slowly through steady accumulation'},
  {icon:'🐯',name:'Wood · Tiger',desc:'Pushes forward, initiates growth and bold new directions'},
  {icon:'🐇',name:'Wood · Rabbit',desc:'Navigates through relationships, grows through connection and sensitivity'},
  {icon:'🐉',name:'Earth · Dragon',desc:'Holds latent power, shifts and transforms underlying structures'},
  {icon:'🐍',name:'Fire · Snake',desc:'Observes quietly, releases focused bursts of insight and action'},
  {icon:'🐎',name:'Fire · Horse',desc:'Drives outward energy, expresses quickly and intensely'},
  {icon:'🐐',name:'Earth · Goat',desc:'Absorbs emotional weight, sustains through quiet persistence'},
  {icon:'🐒',name:'Metal · Monkey',desc:'Analyzes patterns, adapts quickly through strategy and skill'},
  {icon:'🐓',name:'Metal · Rooster',desc:'Applies precision, enforces standards and sharp judgment'},
  {icon:'🐕',name:'Earth · Dog',desc:'Carries responsibility, stabilizes through loyalty and structure'},
  {icon:'🐗',name:'Water · Pig',desc:'Absorbs and restores, flows back into rest and recovery'},
];

const EC_SR={Wood:'el-wood',Fire:'el-fire',Earth:'el-earth',Metal:'el-metal',Water:'el-water'};
const EB_SR={Wood:'bg-wood',Fire:'bg-fire',Earth:'bg-earth',Metal:'bg-metal',Water:'bg-water'};

function getTenGodSR(dayTG, tg){
  const dE=TG_ELEM_SR[dayTG],dY=TG_YY[dayTG],tE=TG_ELEM_SR[tg],tY=TG_YY[tg];
  const gen={Wood:'Fire',Fire:'Earth',Earth:'Metal',Metal:'Water',Water:'Wood'};
  const ctrl={Wood:'Earth',Fire:'Metal',Earth:'Water',Metal:'Wood',Water:'Fire'};
  const genBy={Fire:'Wood',Earth:'Fire',Metal:'Earth',Water:'Metal',Wood:'Water'};
  const ctrlBy={Earth:'Wood',Metal:'Fire',Water:'Earth',Wood:'Metal',Fire:'Water'};
  if(tE===dE)return tY===dY?'Self':'Competitive';
  if(gen[dE]===tE)return tY===dY?'Smooth':'Bold';
  if(ctrl[dE]===tE)return tY!==dY?'Steady':'Opportunity';
  if(ctrlBy[dE]===tE)return tY!==dY?'Structured':'Intense';
  if(genBy[dE]===tE)return tY!==dY?'Safe':'Intuitive';
  return'Self';
}

function buildPillarsHTML(pillars){
  const dayTG = Array.isArray(pillars?.[2]) ? pillars[2][0] : 0;
  let html='';
  (pillars||[]).forEach((p,idx)=>{
    const tg=Array.isArray(p)?p[0]:p.tg;
    const dz=Array.isArray(p)?p[1]:p.dz;
    const elem=TG_ELEM_SR[tg]||'Earth';
    const yy=TG_YY[tg];
    const sd=STEM_SR[elem]?.[yy]||{icon:'✦',name:elem,desc:''};
    const bd=BRANCH_SR[dz]||{icon:'✦',name:'',desc:''};
    const branchElem=DZ_ELEM_SR[dz]||'Earth';
    const isDay=idx===2;
    const tenGod=isDay?'Your Day Master':getTenGodSR(dayTG,tg);
    const mTG=DZ_MAIN_TG_SR[dz];
    const branchGod=(mTG>=0&&!isDay)?getTenGodSR(dayTG,mTG):'';
    const label=PILLAR_LABELS[idx]||'';
    html+=`<div class="pillar-card${isDay?' day-master-card':''}">
      <div class="pillar-label${isDay?' gold':''}">${label}</div>
      <div style="text-align:center;width:100%">
        <span class="energy-icon">${sd.icon}</span>
        <div class="ten-god-badge ${EB_SR[elem]}">${tenGod}</div>
        <div class="p-elem-name ${EC_SR[elem]}">${sd.name}</div>
        <div class="p-elem-desc">${sd.desc}</div>
      </div>
      <div class="pillar-divider"></div>
      <div style="text-align:center;width:100%">
        <span class="energy-icon">${bd.icon}</span>
        ${branchGod?`<div class="ten-god-badge ${EB_SR[branchElem]}">${branchGod}</div>`:''}
        <div class="branch-name ${EC_SR[branchElem]}">${bd.name}</div>
        <div class="p-elem-desc">${bd.desc}</div>
      </div>
    </div>`;
  });
  return html;
}

function parseReportSections(md){
  const MAP={"Who You Really Are":'realLike',"Love & Relationships":'love',"Career & Wealth":'career',"2026":'forecast',"What Balances You":'balance'};
  const sections={};let cur=null,buf=[];
  function flush(){if(cur&&buf.length)sections[cur]=buf.join('\n').trim();}
  for(const line of md.split('\n')){
    if(line.startsWith('# ')&&!line.startsWith('## '))continue;
    if(line.startsWith('## ')){flush();buf=[];cur=null;const h=line.replace(/^## /,'').replace(/[🔥⚡⚠️💰❤️🌍📅]/g,'').trim();for(const[k,v]of Object.entries(MAP)){if(h.includes(k)){cur=v;break;}}continue;}
    if(line.startsWith('### ')){buf.push('\n__SUBHEAD__'+line.replace(/^### /,''));continue;}
    if(cur!==null)buf.push(line);
  }
  flush();return sections;
}

function toHTML(text){
  if(!text)return'';
  return text.split(/\n\n+/).map(p=>{
    p=p.trim();if(!p)return'';
    if(p.startsWith('__SUBHEAD__'))return`<p class="subsection-head">${p.replace('__SUBHEAD__','')}</p>`;
    const inner=p.replace(/\n/g,'<br>');
    return p.length<=60?`<p class="section-emphasis">${inner}</p>`:`<p>${inner}</p>`;
  }).filter(Boolean).join('');
}

function splitLove(text){
  const markers=['__SUBHEAD__Who You Actually Need','__SUBHEAD__👉 Who You Actually Need'];
  for(const m of markers){const i=text.indexOf(m);if(i!==-1)return{loveBody:text.slice(0,i).trim(),whoYouNeed:text.slice(i+m.length).trim()};}
  return{loveBody:text,whoYouNeed:''};
}

function renderArchetypeHeader(data, birth){
  const archetypeName = data.archetype?.name || '';
  const archetypeEmoji = data.archetype?.emoji || '✦';
  // Day master elem: pillars[2][0] 기준
  const dayTgIdx = Array.isArray(data.pillars?.[2]) ? data.pillars[2][0] : null;
  const elemLabel = dayTgIdx !== null ? (DAY_MASTER_ELEM[dayTgIdx] || '') : '';

  let dateStr = '';
  if(birth?.date){
    const d = new Date(birth.date + 'T12:00:00');
    dateStr = d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  }

  document.getElementById('archetypeHeader').innerHTML = `
    <div class="archetype-header">
      ${dateStr ? `<div class="archetype-header-date">${dateStr}</div>` : ''}
      <div class="archetype-header-content">
        <span class="archetype-header-emoji">${archetypeEmoji}</span>
        <div class="archetype-header-text">
          <div class="archetype-header-name">${archetypeName}</div>
          ${elemLabel ? `<div class="archetype-header-elem">${elemLabel} · Day Master</div>` : ''}
        </div>
      </div>
    </div>`;
}

function buildReport(data, isPaid){
  const{report,archetype,pillars,elemCount}=data;
  const sections=parseReportSections(report||'');
  const pillarsHTML=buildPillarsHTML(pillars);

  const section1=`<div class="section"><div class="section-tag">🔥 Who You Really Are</div><div class="section-body">${toHTML(sections.realLike)}</div></div>`;

  const{loveBody,whoYouNeed}=splitLove(sections.love||'');
  const loveHTML=`<div class="section"><div class="section-tag">❤️ Love & Relationships</div><div class="section-body">${toHTML(loveBody)}${whoYouNeed?`<div class="who-you-need"><div class="who-you-need-label">👉 Who You Actually Need</div>${toHTML(whoYouNeed)}</div>`:''}</div></div>`;

  const gatedHTML=`
    <div class="section"><div class="section-tag">💰 Career & Wealth</div><div class="section-body">${toHTML(sections.career)}</div></div>
    <div class="section"><div class="section-tag">📅 2026–2027 Forecast</div><div class="section-body">${toHTML(sections.forecast)}</div></div>
    ${loveHTML}
    <div class="section"><div class="section-tag">🌍 What Balances You</div><div class="section-body">${toHTML(sections.balance)}</div></div>`;

  const gatedBlock=isPaid?gatedHTML:`
    <div class="paygate-cta">
      <div class="paygate-title">Your full reading is ready.</div>
      <div class="paygate-sub">Unlock your career patterns, money flow, love dynamics, 2026–2027 forecast, and what actually balances you.</div>
      <div class="paygate-price"><span style="text-decoration:line-through;font-size:24px;opacity:0.5;margin-right:8px;">$14.99</span>$9.99</div>
      <div class="paygate-note">Limited offer · One-time · No subscription</div>
      <button class="paygate-btn" id="unlockBtn" onclick="openWhopModal()">✦ Unlock Full Reading · $9.99</button>
    </div>
    <div class="paygate-wrapper"><div class="paygate-blur">${gatedHTML}</div></div>`;

  const feedbackSection=isPaid?`
    <div class="feedback-section" id="feedbackSection">
      <div class="feedback-title">How did this feel?</div>
      <div class="feedback-sub">Your honest reaction helps us improve. Takes 30 seconds.</div>
      <textarea class="feedback-textarea" id="feedbackText" placeholder="What resonated? What felt off? Anything you'd add…"></textarea>
      <button class="feedback-submit" onclick="submitFeedback()">Send Feedback</button>
      <div class="feedback-thanks" id="feedbackThanks">✦ Thank you — your feedback means a lot.</div>
    </div>`:'';

  return`
    <div class="manse-section">
      <div class="manse-label">Your Four Pillars</div>
      <div class="pillars-grid">${pillarsHTML}</div>
    </div>
    <div class="section-divider">· · ·</div>
    ${section1}
    ${gatedBlock}
    ${feedbackSection}`;
}

window.onCheckoutComplete=async function(planId,receiptId){
  closeWhopModal();
  sessionStorage.setItem('short_report_token',receiptId||'paid');
  const payload=JSON.stringify({event:'payment_completed',metadata:{plan_id:planId,receipt_id:receiptId,session_id:getSessionId()}});
  navigator.sendBeacon('/api/track',new Blob([payload],{type:'application/json'}));
  if(typeof gtag!=='undefined'){
    gtag('event','conversion',{'send_to':'AW-18045718869','value':9.99,'currency':'USD','transaction_id':receiptId||''});
    gtag('event','purchase',{'transaction_id':receiptId||'','value':9.99,'currency':'USD','items':[{'item_id':'saju_full_reading','item_name':'Saju Full Reading','price':9.99,'quantity':1}]});
  }
  const data=window._reportData;
  if(data){
    const rc=document.getElementById('reportContent');
    rc.innerHTML=buildReport(data,true);
    rc.scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('shareBar').classList.add('visible');
    try{
      const birth=JSON.parse(sessionStorage.getItem('saju_birth')||'{}');
      const res=await fetch('/api/save-short-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reportData:data,birth,email:null})});
      const d=await res.json();
      if(d.shareId)_shareUrl=`https://sajublueprint.com/shortresult?id=${d.shareId}&ref=shared`;
    }catch(e){console.error('save failed:',e);}
  }
};

async function openWhopModal(){
  trackEvent('unlock_clicked');
  const btn=document.getElementById('unlockBtn');
  if(btn){btn.textContent='Loading…';btn.disabled=true;}
  document.getElementById('whopOverlay').classList.add('visible');
  document.body.style.overflow='hidden';
  document.getElementById('modalLoading').style.display='flex';
  document.getElementById('whopCheckoutDiv').style.display='none';
  setTimeout(()=>{
    document.getElementById('modalLoading').style.display='none';
    document.getElementById('whopCheckoutDiv').style.display='block';
    if(window.WhopSDK&&window.WhopSDK.init)window.WhopSDK.init();
  },600);
  if(btn){btn.textContent='✦ Unlock Full Reading · $9.99';btn.disabled=false;}
}
function closeWhopModal(){document.getElementById('whopOverlay').classList.remove('visible');document.body.style.overflow='';}
function handleOverlayClick(e){if(e.target===document.getElementById('whopOverlay'))closeWhopModal();}

let _shareUrl=null;
async function copyShareLink(){
  const btn=document.getElementById('shareBtn');
  trackEvent('share_clicked');
  if(_shareUrl){_doCopy(_shareUrl,btn);return;}
  if(btn)btn.textContent='Saving…';
  try{
    const birth=JSON.parse(sessionStorage.getItem('saju_birth')||'{}');
    const res=await fetch('/api/save-short-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reportData:window._reportData,birth,email:null})});
    const d=await res.json();
    if(d.shareId)_shareUrl=`https://sajublueprint.com/shortresult?id=${d.shareId}&ref=shared`;
    _doCopy(_shareUrl||location.href,btn);
  }catch(e){_doCopy(location.href,btn);}
  finally{if(btn)btn.disabled=false;}
}
function _doCopy(url,btn){
  navigator.clipboard.writeText(url).then(()=>{
    if(btn){const orig=btn.textContent;btn.textContent='✓ Copied!';setTimeout(()=>{btn.textContent=orig;},2500);}
  }).catch(()=>{prompt('Copy this:',url);});
}

async function submitFeedback(){
  const text=document.getElementById('feedbackText')?.value?.trim();
  if(!text)return;
  const btn=document.querySelector('.feedback-submit');
  btn.textContent='Sending…';btn.disabled=true;
  try{await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,page:'short_report'})});}catch(e){}
  btn.style.display='none';
  document.getElementById('feedbackThanks').style.display='block';
  document.getElementById('feedbackText').style.display='none';
}

async function loadReport(){
  const params=new URLSearchParams(window.location.search);
  const shareId=params.get('id');
  const isPaid=!!sessionStorage.getItem('short_report_token');

  if(shareId){
    try{
      const res=await fetch('/api/get-short-report?id='+shareId);
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      window._reportData=data.reportData;
      _shareUrl=`https://sajublueprint.com/shortresult?id=${shareId}&ref=shared`;
      renderArchetypeHeader(data.reportData, data.birth);
      trackEvent('short_result_viewed',{is_paid:true,source:'share'});
      document.getElementById('loadingState').style.display='none';
      const rc=document.getElementById('reportContent');
      rc.innerHTML=buildReport(data.reportData,true);
      rc.style.display='block';
      window.scrollTo(0,0);
      document.getElementById('shareBar').classList.add('visible');
    }catch(e){
      document.getElementById('loadingState').style.display='none';
      document.getElementById('errorState').style.display='block';
    }
    return;
  }

  const cachedReport=sessionStorage.getItem('saju_report');
  if(cachedReport){
    try{
      const data=JSON.parse(cachedReport);
      window._reportData=data;
      const birth=JSON.parse(sessionStorage.getItem('saju_birth')||'{}');
      renderArchetypeHeader(data, birth);
      trackEvent('short_result_viewed',{is_paid:isPaid,archetype:data.archetype?.name||''});
      document.getElementById('loadingState').style.display='none';
      const rc=document.getElementById('reportContent');
      rc.innerHTML=buildReport(data,isPaid);
      rc.style.display='block';
      window.scrollTo(0,0);
      if(isPaid){
        document.getElementById('shareBar').classList.add('visible');
        try{
          const res=await fetch('/api/save-short-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reportData:data,birth,email:null})});
          const d=await res.json();
          if(d.shareId)_shareUrl=`https://sajublueprint.com/shortresult?id=${d.shareId}&ref=shared`;
        }catch(e){console.error('auto save failed:',e);}
      }
    }catch(e){
      document.getElementById('loadingState').style.display='none';
      document.getElementById('errorState').style.display='block';
    }
    return;
  }

  document.getElementById('loadingState').style.display='none';
  document.getElementById('errorState').style.display='block';
}

if('scrollRestoration' in history) history.scrollRestoration = 'manual';
loadReport();
</script>
