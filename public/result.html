<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Your Saju Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── Loading screen ── */
#loadingScreen {
  position:fixed; inset:0; background:#0b0f1e; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'EB Garamond',serif;
}
.loading-rings { position:relative; width:160px; height:160px; margin-bottom:32px; }
.l-ring { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  border:1px solid rgba(201,168,76,0.45); border-radius:50%;
  animation:ring-pulse 3s infinite; }
.l-ring:nth-child(1){ width:140px;height:140px;animation-delay:0s; }
.l-ring:nth-child(2){ width:100px;height:100px;animation-delay:0.6s; }
.l-ring:nth-child(3){ width:60px;height:60px;animation-delay:1.2s; }
.l-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:30px; animation:float 2s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-5px)} }
.loading-text { color:#e8dfc8; font-size:18px; letter-spacing:2px; }
.loading-sub  { color:rgba(232,223,200,0.45); font-size:14px; margin-top:8px; }

/* ── PDF/Share bar ── */
.pdf-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(11,15,30,0.96); border-top:1px solid rgba(201,168,76,0.3);
  padding-top:12px; padding-bottom:max(12px, env(safe-area-inset-bottom));
  box-sizing:border-box;
  display:flex; justify-content:center;
}
.pdf-bar-inner {
  display:flex; gap:8px;
  box-sizing:border-box;
  /* width/left set by alignPdfBar() to exactly match .page */
}
.pdf-btn {
  background:#c9a84c; border:none; color:#0b0f1e;
  font-family:'EB Garamond',serif; font-size:14px; letter-spacing:2px;
  padding:12px 0; cursor:pointer; text-transform:uppercase; font-weight:600;
  transition:background 0.2s; flex:1; text-align:center; white-space:nowrap;
}
.pdf-btn:hover { background:#d4b060; }
.copy-btn {
  background:transparent; border:1px solid rgba(201,168,76,0.5); color:#c9a84c;
  font-family:'EB Garamond',serif; font-size:14px; letter-spacing:2px;
  padding:12px 0; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s; flex:1; text-align:center; white-space:nowrap;
}
.copy-btn:hover { background:rgba(201,168,76,0.08); border-color:#c9a84c; }
.copy-btn.copied { color:#7ab87a; border-color:#7ab87a; }
.pdf-note { color:rgba(232,223,200,0.45); font-size:13px; }

/* ── Dark PDF print ── */
@media print {
  .pdf-bar, #loadingScreen { display:none !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  html, body { background:#0b0f1e !important; }
  .page { padding-bottom:0 !important; }
  .section { opacity:1 !important; transform:none !important; }
}

/* ── Blueprint CSS ── */
:root {
  --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.45); --gold-faint:rgba(201,168,76,0.12);
  --navy:#0b0f1e; --navy-card:#131929;
  --text:#e8dfc8; --text-dim:rgba(232,223,200,0.65); --text-faint:rgba(232,223,200,0.38);
  --water:#6ab0d4; --wood:#7ab87a; --fire:#e87070; --metal:#b0c4d8;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; overflow-x:hidden; }
body { background:var(--navy); color:var(--text); font-family:'EB Garamond',serif; overflow-x:hidden; }
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; border-radius:50%; background:var(--gold); opacity:0;
  animation:twinkle var(--d) ease-in-out infinite var(--delay); }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:var(--bright);transform:scale(1)} }
.page { position:relative; z-index:1; max-width:680px; width:100%; margin:0 auto; padding:0 24px 120px; }
.hero { text-align:center; padding:72px 0 48px; position:relative; }
.hero-rings { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; width:1px; height:1px; }
.hero-ring { position:absolute; border-radius:50%; border:1px solid var(--gold-faint); top:50%; left:50%; transform:translate(-50%,-50%); animation:ring-pulse 4s ease-in-out infinite; }
@keyframes ring-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
.brand-label { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:5px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:28px; }
.hero-title { font-family:'Cormorant Garamond',serif; font-size:clamp(36px,8vw,52px); font-weight:300; color:var(--gold); letter-spacing:1px; line-height:1.15; margin-bottom:6px; }
.hero-name { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,5vw,30px); font-weight:300; color:var(--text); letter-spacing:3px; margin-bottom:16px; }
.hero-name::before,.hero-name::after { content:' \2756 '; color:var(--gold-dim); font-size:14px; }
.hero-date { font-size:14px; letter-spacing:2px; color:var(--text-faint); margin-bottom:40px; }
.hero-divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); }
.archetype { text-align:center; padding:40px 0 32px; }
.archetype-icon { font-size:42px; margin-bottom:12px; display:block; font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }
.archetype-label { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:4px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:10px; }
.archetype-name { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:600; font-style:italic; color:var(--gold); line-height:1.3; }
.section { margin-bottom:2px; padding:48px 0; border-bottom:1px solid rgba(201,168,76,0.08); opacity:0; transform:translateY(24px); transition:opacity 0.7s ease,transform 0.7s ease; }
.section.visible { opacity:1; transform:none; }
.section-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.section-num { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:4px; color:var(--gold-dim); }
.section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--gold-dim),transparent); }
.section-icon { font-size:32px; display:block; margin-bottom:12px; font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }
.section-title { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,4vw,28px); font-weight:400; color:var(--text); margin-bottom:8px; }
.section-subtitle { font-size:16px; color:var(--gold); font-style:italic; margin-bottom:28px; }
.card { background:var(--navy-card); border:1px solid rgba(201,168,76,0.12); padding:28px; margin-bottom:14px; }
.card-title { font-size:13px; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; }
.card-title.gold { color:var(--gold); }
.card-body { font-size:17px; color:var(--text-dim); line-height:1.75; }
.card-body strong { color:var(--text); font-weight:600; }
.advice-box { border:1px solid var(--gold-dim); padding:20px 24px; margin-top:16px; background:var(--gold-faint); }
.advice-label { font-size:11px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:10px; }
.advice-body { font-size:17px; color:var(--text); line-height:1.7; }
.element-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin:24px 0; }
@media(max-width:500px){ .element-grid { grid-template-columns:repeat(3,1fr); } }
.element-pill { background:var(--navy-card); border:1px solid rgba(201,168,76,0.12); padding:14px 8px; text-align:center; }
.element-pill.missing { border-color:rgba(232,223,200,0.15); opacity:0.45; }
.el-emoji { font-size:22px; margin-bottom:6px; font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }
.el-name { font-size:11px; letter-spacing:2px; color:var(--text-faint); text-transform:uppercase; margin-bottom:4px; }
.el-count { font-size:20px; }
.vault-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:20px 0; }
.vault { background:var(--navy-card); border:1px solid rgba(201,168,76,0.15); padding:16px; text-align:center; }
.vault-char { font-size:28px; color:var(--gold); margin-bottom:6px; }
.vault-label { font-size:11px; letter-spacing:2px; color:var(--text-faint); text-transform:uppercase; margin-bottom:4px; }
.vault-name { font-size:14px; color:var(--text-dim); }

/* Relationship expanded */
.rel-pattern { background:var(--navy-card); border-left:3px solid var(--fire); padding:20px 24px; margin-bottom:12px; }
.rel-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; }
.rel-pattern .rel-label { color:var(--fire); }
.rel-compatible { background:var(--navy-card); border-left:3px solid var(--wood); padding:20px 24px; margin-bottom:12px; }
.rel-compatible .rel-label { color:var(--wood); }
.rel-warning { background:var(--navy-card); border-left:3px solid rgba(232,112,112,0.6); padding:20px 24px; margin-bottom:12px; }
.rel-warning .rel-label { color:#e87070; }
.rel-endgame { background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03)); border:1px solid var(--gold-dim); padding:24px; margin-bottom:12px; }
.rel-endgame .rel-label { color:var(--gold); }

/* 대운 decade cards */
.daewon-intro { font-size:17px; color:var(--text-dim); line-height:1.7; margin-bottom:28px; }
.decade-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
@media(max-width:520px){ .decade-grid { grid-template-columns:1fr; } }
.decade-card { background:var(--navy-card); border:1px solid rgba(201,168,76,0.12); padding:20px; position:relative; overflow:hidden; }
.decade-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--gold-dim); }
.decade-age { font-size:11px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:4px; }
.decade-label { font-size:17px; color:var(--text); margin-bottom:4px; }
.decade-energy { font-size:12px; color:var(--text-faint); margin-bottom:12px; }
.decade-icon { position:absolute; top:16px; right:16px; font-size:22px; }
.decade-body { font-size:15px; color:var(--text-dim); line-height:1.65; }
.peak-box { background:rgba(201,168,76,0.08); border:1px solid var(--gold-dim); padding:20px 24px; margin:16px 0; }
.peak-label { font-size:11px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
.caution-box { background:rgba(232,112,112,0.06); border:1px solid rgba(232,112,112,0.3); padding:20px 24px; margin:12px 0; }
.caution-label { font-size:11px; letter-spacing:3px; color:#e87070; text-transform:uppercase; margin-bottom:8px; }

/* ── Life Activation Map ── */
.lam-graph-wrap { position:relative; margin:28px 0 8px; }
.lam-graph { position:relative; background:var(--navy-card); border:1px solid rgba(201,168,76,0.12); padding:24px 20px 16px; overflow:hidden; }
#lamGraphWrap { width:100%; min-height:180px; background:var(--navy-card); border:1px solid rgba(201,168,76,0.1); margin-bottom:8px; overflow:hidden; }
.lam-y-labels { position:absolute; left:0; top:24px; bottom:32px; display:flex; flex-direction:column; justify-content:space-between; padding:0; }
.lam-y-label { font-size:10px; color:var(--text-faint); letter-spacing:1px; width:28px; text-align:right; }
.lam-chart-area { margin-left:36px; position:relative; }
.lam-grid-lines { position:absolute; inset:0; pointer-events:none; }
.lam-grid-line { position:absolute; left:0; right:0; height:1px; background:rgba(255,255,255,0.04); }
.lam-zones { position:absolute; inset:0; pointer-events:none; }
.lam-zone { position:absolute; left:0; right:0; }
.lam-svg-wrap { position:relative; width:100%; }
.lam-svg-wrap svg { width:100%; display:block; }
.lam-x-axis { display:flex; margin-left:36px; margin-top:6px; }
.lam-x-label { flex:1; text-align:center; font-size:10px; color:var(--text-faint); letter-spacing:1px; }
.lam-legend { display:flex; gap:16px; flex-wrap:wrap; margin:16px 0 24px; }
.lam-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-faint); }
.lam-legend-dot { width:10px; height:10px; border-radius:50%; }
.lam-decades { display:flex; flex-direction:column; gap:10px; margin-top:8px; }
.lam-decade { background:var(--navy-card); border:1px solid rgba(201,168,76,0.1); padding:16px 18px; position:relative; overflow:hidden; }
.lam-decade::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
.lam-decade.peak::before     { background:#f4a342; }
.lam-decade.favorable::before{ background:#7ab87a; }
.lam-decade.neutral::before  { background:#c9a84c; }
.lam-decade.pressure::before { background:#b0c4d8; }
.lam-decade.risk::before     { background:#9b8ec4; }
.lam-decade-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:8px; }
.lam-decade-age { font-size:13px; letter-spacing:2px; color:var(--gold); }
.lam-decade-left { display:flex; flex-direction:column; gap:3px; }
.lam-decade-sub { font-size:11px; color:rgba(232,223,200,0.3); }
.lam-decade-badge { display:flex; flex-direction:column; align-items:flex-end; gap:2px; font-size:12px; font-weight:600; letter-spacing:1px; text-align:right; flex-shrink:0; max-width:48%; }
.lam-decade-badge-label { white-space:nowrap; }
.lam-decade-badge-score { font-size:13px; white-space:nowrap; }
.lam-decade-badge.peak     { color:#f4a342; }
.lam-decade-badge.favorable{ color:#7ab87a; }
.lam-decade-badge.neutral  { color:#c9a84c; }
.lam-decade-badge.pressure { color:#b0c4d8; }
.lam-decade-badge.risk     { color:#9b8ec4; }
.lam-markers { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.lam-marker { font-size:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); padding:3px 10px; border-radius:2px; color:var(--text-dim); }
.lam-decade-advice { font-size:14px; color:var(--text-faint); line-height:1.6; font-style:italic; }
.lam-activation-row { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.lam-activation-year { font-size:11px; color:var(--text-faint); }
.lam-activation-dots { color:var(--gold); letter-spacing:-2px; }
.lam-section-label { font-size:11px; letter-spacing:3px; color:var(--gold-dim); text-transform:uppercase; margin:24px 0 12px; }

@media(max-width:480px) {
  .page { padding:0 16px 120px; }

  .pdf-btn, .copy-btn { font-size:13px; letter-spacing:1px; padding:12px 14px; }
  .hero-title { font-size:28px; }
  .lam-legend { gap:10px; }
  .lam-legend-item { font-size:11px; }
  .decade-grid { grid-template-columns:1fr; }
}

/* ── Section 01: Core Energy System ── */
.s1-graph-block {
  background:var(--navy-card);
  border:1px solid rgba(201,168,76,0.12);
  padding:22px 22px;
  margin-bottom:12px;
}
.s1-graph-title {
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin-bottom:14px;
}
.s1-bar-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.s1-bar-label { font-size:13px; color:var(--text-dim); width:130px; flex-shrink:0; }
.s1-bar-track {
  flex:1;
  height:7px;
  background:rgba(255,255,255,0.06);
  border-radius:4px;
  overflow:hidden;
}
.s1-bar-fill {
  height:100%;
  border-radius:4px;
  transition:width 1s ease;
}
.s1-bar-energy   { background:linear-gradient(90deg,#c9a84c,#e8d08a); }
.s1-bar-pressure { background:linear-gradient(90deg,#e87070,#f4a0a0); }
.s1-bar-val { font-size:13px; color:var(--gold); width:28px; text-align:right; flex-shrink:0; font-weight:600; }
.s1-state-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid rgba(201,168,76,0.1);
}
.s1-state-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); }
.s1-state-val { font-size:13px; color:var(--gold); font-weight:600; letter-spacing:1px; }
/* Natural Behavior Pattern */
.s1-pattern-header {
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin:24px 0 12px;
}
.s1-behavior-block {
  display:flex;
  gap:14px;
  align-items:flex-start;
  padding:16px 0;
  border-bottom:1px solid rgba(201,168,76,0.08);
}
.s1-behavior-block:last-child { border-bottom:none; }
.s1-behavior-emoji { font-size:22px; flex-shrink:0; margin-top:2px; width:32px; text-align:center; }
.s1-behavior-content { flex:1; }
.s1-behavior-title {
  font-size:15px;
  color:var(--text);
  margin-bottom:7px;
  display:flex;
  align-items:center;
  gap:8px;
}
.s1-behavior-level {
  font-size:11px;
  color:var(--gold-dim);
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:normal;
}
.s1-behavior-body { font-size:14px; color:var(--text-dim); line-height:1.7; }
/* ── END Section 01 ── */

/* ── Section 02: Structural Blind Spots ── */
.s2-blind-spot {
  border-left:2px solid rgba(201,168,76,0.3);
  padding:24px 0 24px 22px;
  margin-bottom:10px;
  position:relative;
}
.s2-blind-spot:last-child { margin-bottom:0; }
.s2-spot-header {
  display:flex;
  align-items:flex-start;
  gap:14px;
  margin-bottom:12px;
}
.s2-spot-num {
  font-size:11px;
  letter-spacing:2px;
  color:var(--gold);
  font-weight:600;
  flex-shrink:0;
  padding-top:2px;
}
.s2-spot-meta { flex:1; }
.s2-spot-title {
  font-size:17px;
  color:var(--text);
  margin-bottom:4px;
  font-family:'Cormorant Garamond',serif;
}
.s2-spot-cat {
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--gold-dim);
}
.s2-spot-body {
  font-size:14px;
  color:var(--text-dim);
  line-height:1.75;
}
/* ── END Section 02 ── */

/* ── Section 03: Love & Relationship ── */
.s3-block-title {
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin:32px 0 14px;
}
.s3-disclaimer {
  font-size:14px;
  color:var(--text-dim);
  line-height:1.7;
  margin-bottom:16px;
}
.s3-love-meta {
  background:var(--navy-card);
  border:1px solid rgba(201,168,76,0.1);
  padding:20px 22px;
  margin-bottom:14px;
}
.s3-meta-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 0;
}
.s3-meta-row + .s3-meta-row { border-top:1px solid rgba(201,168,76,0.07); }
.s3-meta-label { font-size:13px; color:var(--text-faint); letter-spacing:0.5px; }
.s3-meta-val   { font-size:14px; color:var(--gold); text-align:right; max-width:60%; }
.s3-body {
  font-size:15px;
  color:var(--text-dim);
  line-height:1.8;
  margin-bottom:6px;
}
/* Architecture grid */
.s3-arch-grid {
  background:var(--navy-card);
  border:1px solid rgba(201,168,76,0.12);
  padding:24px 22px;
  margin-bottom:14px;
}
.s3-arch-row {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid rgba(201,168,76,0.07);
}
.s3-arch-row-last { border-bottom:none; }
.s3-arch-label {
  display:flex;
  flex-direction:column;
  gap:3px;
  flex:1.4;
  min-width:0;
}
.s3-arch-name { font-size:14px; color:var(--text); }
.s3-arch-desc { font-size:12px; color:var(--text-faint); line-height:1.4; }
.s3-arch-bar-wrap {
  flex:0.8;
  display:flex;
  align-items:center;
  gap:10px;
}
.s3-arch-bar-track {
  flex:1;
  height:7px;
  background:rgba(255,255,255,0.06);
  border-radius:4px;
  overflow:hidden;
}
.s3-arch-bar-fill { height:100%; border-radius:4px; transition:width 1s ease; }

async function trackEvent(eventName, metadata = {}) {
  const p = new URLSearchParams(window.location.search);
  try {
    await fetch('/api/track', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        event: eventName,
        metadata: {
          ...metadata,
          session_id: getSessionId(),
          source:   p.get('utm_source')   || 'direct',
          medium:   p.get('utm_medium')   || 'none',
          campaign: p.get('utm_campaign') || 'none',
          referrer: document.referrer     || 'none',
        }
      })
    });
  } catch(e) {}
}

function sanitize(str) {
  if (typeof str !== 'string') return str;
  return str
    .replace(/\u2019|\u2018/g, "'")
    .replace(/\u201C|\u201D/g, '"')
    .replace(/\u2014/g, '--')
    .replace(/\u2013/g, '-')
    .replace(/\u2026/g, '...')
    .replace(/[\u0080-\u009F]/g, '');
}

function g(obj, ...keys) {
  let v = obj;
  for (const k of keys) { if (v == null) break; v = v[k]; }
  if (v === undefined || v === null || v === '') return '--';
  return sanitize(String(v));

// ── Scroll reveal
function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold:0.06, rootMargin:'0px 0px -30px 0px' });
  document.querySelectorAll('.section:not(.visible)').forEach(el => obs.observe(el));
}

// ── Life Activation Map
function renderLifeActivationMap(augmented) {
  if (!augmented || !augmented.length) return;

  // ── 등급
  function getGrade(score) {
    if (score >= 70) return { key:'peak',      label:'⭐ Peak Window',         color:'#f4a342' };
    if (score >= 58) return { key:'favorable', label:'✦ Growth Phase',         color:'#7ab87a' };
    if (score >= 46) return { key:'neutral',   label:'◎ Neutral Phase',        color:'#c9a84c' };
    if (score >= 34) return { key:'pressure',  label:'◇ Learning Phase',       color:'#b0c4d8' };
    return                   { key:'risk',     label:'○ Transformation Phase', color:'#9b8ec4' };
  }

  // ── 이벤트 마커
  function getMarkers(d) {
    var mk = [], ev = d.interaction.events || [], log = d.interaction.scoreLog || [];
    var logStr = log.join(' ');
    var score  = d.interaction.score;
    var evTypes = ev.map(function(e){ return e.type; });

    var hasClash   = logStr.indexOf('clash') > -1 || logStr.indexOf('REACTIVATION') > -1;
    var hasBreak   = logStr.indexOf('Break') > -1;
    var hasGishin  = logStr.indexOf('Gishin') > -1;
    var hasOfficer = logStr.indexOf('Officer') > -1 || logStr.indexOf('정관') > -1;
    var hasSikSang = logStr.indexOf('Output') > -1 || logStr.indexOf('Expression') > -1;
    var hasWealth  = logStr.indexOf('Wealth') > -1 || logStr.indexOf('재') > -1;
    var hasYong    = logStr.indexOf('Yongshin') > -1;
    var hasIndep   = evTypes.indexOf('INDEPENDENCE_SURGE') > -1;
    var hasCareerL = evTypes.indexOf('CAREER_LOCK_IN') > -1;
    var hasCareerD = evTypes.indexOf('CAREER_DISRUPTION') > -1;
    var hasCompete = evTypes.indexOf('COMPETITION_EXPANSION') > -1;
    var hasEnvShift= evTypes.indexOf('ENVIRONMENTAL_SHIFT') > -1;

    if (hasOfficer && !hasClash && score > 55)         mk.push('💍 Marriage Window');
    else if ((hasSikSang || hasWealth) && score > 45)  mk.push('❤️ High Romance Activity');
    if (hasClash || hasBreak || hasEnvShift)           mk.push('✈ Relocation / Life Shift');
    if (hasCareerL || (hasIndep && score > 65))        mk.push('💼 Career Expansion');
    else if (hasCompete && score > 60)                 mk.push('💰 Expansion / Risk Window');
    else if (hasCareerD)                               mk.push('⚠ Career Disruption');
    if (hasGishin && hasClash && score < 30)           mk.push('🏥 Health Watch');
    if (hasIndep && score >= 75)                       mk.push('🌱 Personal Authority Peak');
    return mk;
  }

  // ── Activation dots
  function getDots(d) {
    var n = 0, log = d.interaction.scoreLog || [], ev = d.interaction.events || [];
    if (log.some(function(l){ return l.indexOf('clash') > -1; }))        n += 2;
    if (log.some(function(l){ return l.indexOf('REACTIVATION') > -1; })) n += 2;
    if (log.some(function(l){ return l.indexOf('Yongshin') > -1; }))     n += 1;
    if (ev.length > 1) n += 1;
    return '●'.repeat(Math.min(n, 4));
  }

  // ── Canvas 그래프 (SVG innerHTML 대신 — 모든 브라우저 지원)
  var wrap = document.getElementById('lamGraphWrap');
  if (!wrap) return;

  var DPR    = window.devicePixelRatio || 1;
  var W_CSS  = wrap.clientWidth || 320;
  var H_CSS  = 180;
  var W      = W_CSS * DPR;
  var H      = H_CSS * DPR;

  var canvas = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W_CSS + 'px';
  canvas.style.height = H_CSS + 'px';
  canvas.style.display = 'block';
  canvas.style.width = '100%';

  var ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  var PAD = { t:24, b:28, l:28, r:8 };
  var n   = augmented.length;
  var gW  = W_CSS - PAD.l - PAD.r;
  var gH  = H_CSS - PAD.t - PAD.b;
  var xStep = n > 1 ? gW / (n - 1) : gW;

  function toX(i) { return PAD.l + i * xStep; }
  function toY(score) {
    // 10점 미만 보정 (saju-engine에서 이미 처리되지만 방어적으로 재적용)
    var s = score < 10 ? score + 10 : score;
    return PAD.t + (1 - s / 100) * gH;
  }

  // Zone bands
  var ZONES = [
    [75, 100, 'rgba(244,163,66,0.08)'],
    [60,  75, 'rgba(122,184,122,0.08)'],
    [45,  60, 'rgba(201,168,76,0.05)'],
    [30,  45, 'rgba(232,160,74,0.07)'],
    [0,   30, 'rgba(232,112,112,0.09)'],
  ];
  ZONES.forEach(function(z) {
    ctx.fillStyle = z[2];
    var y1 = toY(z[1]), y2 = toY(z[0]);
    ctx.fillRect(PAD.l, y1, gW, y2 - y1);
  });

  // Grid lines + Y labels
  [25, 50, 75].forEach(function(v) {
    var y = toY(v);
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.setLineDash([3, 4]);
    ctx.lineWidth = 1;
    ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + gW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(232,223,200,0.25)';
    ctx.font = (DPR > 1 ? '9' : '10') + 'px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(v, PAD.l - 4, y + 3.5);
  });

  // Current decade highlight
  var curIdx = augmented.findIndex(function(d){ return d.isCurrent; });
  if (curIdx < 0) {
    var now = new Date().getFullYear();
    curIdx = augmented.findIndex(function(d){ return d.startYear <= now && now <= d.endYear; });
  }
  if (curIdx >= 0) {
    var cx = toX(curIdx);
    ctx.fillStyle = 'rgba(201,168,76,0.07)';
    ctx.strokeStyle = 'rgba(201,168,76,0.2)';
    ctx.lineWidth = 1;
    ctx.fillRect(cx - xStep * 0.45, PAD.t, xStep * 0.9, gH);
    ctx.strokeRect(cx - xStep * 0.45, PAD.t, xStep * 0.9, gH);
  }

  // Area fill under line
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(0));
  augmented.forEach(function(d, i){ ctx.lineTo(toX(i), toY(d.interaction.score)); });
  ctx.lineTo(toX(n-1), toY(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(201,168,76,0.06)';
  ctx.fill();

  // Dashed shadow line
  ctx.beginPath();
  ctx.setLineDash([4, 3]);
  ctx.strokeStyle = 'rgba(201,168,76,0.25)';
  ctx.lineWidth = 1.5;
  augmented.forEach(function(d, i){
    i === 0 ? ctx.moveTo(toX(i), toY(d.interaction.score))
            : ctx.lineTo(toX(i), toY(d.interaction.score));
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Main line
  ctx.beginPath();
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 2;
  augmented.forEach(function(d, i){
    i === 0 ? ctx.moveTo(toX(i), toY(d.interaction.score))
            : ctx.lineTo(toX(i), toY(d.interaction.score));
  });
  ctx.stroke();

  // Dots + score labels
  augmented.forEach(function(d, i) {
    var g    = getGrade(d.interaction.score);
    var x    = toX(i);
    var y    = toY(d.interaction.score);
    var isCur = (i === curIdx);
    var r    = isCur ? 6 : 4.5;

    // Glow ring for current
    if (isCur) {
      ctx.beginPath();
      ctx.arc(x, y, r + 5, 0, Math.PI * 2);
      ctx.strokeStyle = g.color.replace(')', ',0.35)').replace('rgb','rgba');
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = g.color;
    ctx.fill();
    ctx.strokeStyle = '#0b0f1e';
    ctx.lineWidth = isCur ? 2 : 1.5;
    ctx.stroke();

    // Score label
    ctx.fillStyle = g.color;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.interaction.score, x, y - (isCur ? 13 : 11));
  });

  // X-axis age labels
  ctx.fillStyle = 'rgba(232,223,200,0.35)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  augmented.forEach(function(d, i){
    ctx.fillText(d.age + 's', toX(i), H_CSS - 4);
  });

  // Inject canvas
  wrap.innerHTML = '';
  wrap.appendChild(canvas);

  // ── Decade cards (Event Prediction v2)
  var decadesEl = document.getElementById('lamDecades');
  if (!decadesEl) return;

  var CAT_COLOR = {
    '💍':'rgba(255,200,150,0.12)', '💔':'rgba(232,112,112,0.1)',
    '❤️':'rgba(255,140,160,0.12)', '⚡':'rgba(255,180,80,0.1)',
    '🏆':'rgba(201,168,76,0.12)',  '🚀':'rgba(122,184,122,0.12)',
    '⚠️':'rgba(232,112,112,0.1)', '🔄':'rgba(140,180,255,0.1)',
    '💰':'rgba(122,184,122,0.12)', '📉':'rgba(232,112,112,0.1)',
    '🏦':'rgba(201,168,76,0.1)',   '✈️':'rgba(140,200,255,0.1)',
    '🌑':'rgba(160,140,200,0.1)',  '🏥':'rgba(232,112,112,0.12)',
  };

  // 부정 이벤트 cat 목록
  var NEGATIVE_CATS = {'💔':1,'⚡':1,'⚠️':1,'📉':1,'🏥':1,'🌑':1};
  var NEUTRAL_CATS  = {'✈️':1,'🔄':1};

  function probColor(p, cat) {
    if (NEGATIVE_CATS[cat]) {
      // 부정 이벤트: 확률 높을수록 더 빨간색
      if (p >= 70) return '#e87070';
      if (p >= 50) return '#d4886a';
      return '#c9a07a';
    }
    if (NEUTRAL_CATS[cat]) {
      return '#8cc8ff';  // 이동/변화: 파란색 유지
    }
    // 긍정 이벤트: 확률 높을수록 초록색
    if (p >= 70) return '#7ab87a';
    if (p >= 50) return '#6aaa8a';
    return '#c9a84c';
  }

  var nowYear = new Date().getFullYear();

  var cardsHTML = augmented.map(function(d) {
    var score = d.score !== undefined ? d.score : (d.interaction ? d.interaction.score : 50);
    var g     = getGrade(score);
    var pct   = Math.max(0, Math.min(100, score));
    var isCur = d.startYear <= nowYear && nowYear <= d.endYear;
    var evList = d.events || [];

    var evHTML = '';
    if (evList.length > 0) {
      evHTML = '<div style="display:flex;flex-direction:column;gap:7px;margin-top:12px">';
      evList.forEach(function(ev) {
        var bg = CAT_COLOR[ev.cat] || 'rgba(255,255,255,0.04)';
        evHTML +=
          '<div style="background:' + bg + ';border:1px solid rgba(255,255,255,0.06);padding:9px 12px;margin-bottom:3px">' +
            '<div style="font-size:13px;color:rgba(232,223,200,0.85)">' + (ev.cat||'') + ' ' + (ev.label||'') + '</div>' +
          '</div>';
      });
      evHTML += '</div>';
    } else {
      evHTML = '<div style="margin-top:10px;font-size:13px;color:rgba(232,223,200,0.28);font-style:italic">No dominant events flagged this decade</div>';
    }

    var palaceHTML = '';
    if (d.palaceClashes) {
      var pc2 = d.palaceClashes;
      var badges = [];
      if (pc2.spouse === 'CLASH') badges.push('<span style="font-size:10px;padding:2px 7px;background:rgba(232,112,112,0.15);border:1px solid rgba(232,112,112,0.3);color:#e87070">⚡ Relationship Axis</span>');
      if (pc2.career === 'CLASH') badges.push('<span style="font-size:10px;padding:2px 7px;background:rgba(232,112,112,0.15);border:1px solid rgba(232,112,112,0.3);color:#e87070">⚡ Career Axis</span>');
      if (pc2.invest === 'CLASH') badges.push('<span style="font-size:10px;padding:2px 7px;background:rgba(232,112,112,0.15);border:1px solid rgba(232,112,112,0.3);color:#e87070">⚡ Financial Axis</span>');
      if (d.isYeokma)             badges.push('<span style="font-size:10px;padding:2px 7px;background:rgba(140,200,255,0.12);border:1px solid rgba(140,200,255,0.25);color:#8cc8ff">✈ Movement Star</span>');
      if (badges.length) palaceHTML = '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">' + badges.join('') + '</div>';
    }

    return '<div class="lam-decade ' + g.key + (isCur ? ' current' : '') + '">' +
      '<div class="lam-decade-header">' +
        '<div class="lam-decade-left">' +
          '<div class="lam-decade-age">Ages ' + d.age + '–' + (d.age+9) + (isCur ? '  ← NOW' : '') + '</div>' +
          '<div class="lam-decade-sub">' + d.startYear + '–' + d.endYear + '</div>' +
        '</div>' +
        '<div class="lam-decade-badge ' + g.key + '">' +
          '<span class="lam-decade-badge-label">' + g.label + '</span>' +
          '<span class="lam-decade-badge-score">' + score + '/100</span>' +
        '</div>' +
      '</div>' +
      '<div style="height:3px;background:rgba(255,255,255,0.06);margin-bottom:2px">' +
        '<div style="height:3px;width:' + pct + '%;background:' + g.color + '"></div>' +
      '</div>' +
      palaceHTML + evHTML +
    '</div>';
  }).join('');

  decadesEl.innerHTML = cardsHTML;
}

// ── Main: load from ?id= (priority) OR sessionStorage OR URL hash
async function loadResult() {
  try {
    let raw = null;

    // 1순위: ?id= 쿼리 파라미터 (항상 fetch — 최신 데이터 보장)
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      const resp = await fetch('/api/get-result?id=' + id);
      if (resp.ok) {
        const data = await resp.json();
        if (data.payload) {
          raw = data.payload;
          sessionStorage.setItem('saju_result', raw);
          sessionStorage.setItem('saju_report_id', id);
        }
      } else {
        throw new Error('Report not found or expired');
      }
    }

    // 2순위: sessionStorage 캐시 (?id= 없을 때만)
    if (!raw) {
      raw = sessionStorage.getItem('saju_result');
    }

    // 3순위: URL hash 폴백 (구형 링크 호환)
    if (!raw && window.location.hash) {
      raw = decodeURIComponent(window.location.hash.slice(1));
      if (raw) sessionStorage.setItem('saju_result', raw);
    }

    if (!raw) throw new Error('Result not found');

    // base64 → UTF-8 디코딩 (한글/유니코드 포함)
    let decoded;
    try {
      const bytes = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
      decoded = new TextDecoder('utf-8').decode(bytes);
    } catch(e) {
      decoded = raw;
    }
    if (decoded.startsWith('ey')) {
      try {
        const bytes2 = Uint8Array.from(atob(decoded), c => c.charCodeAt(0));
        decoded = new TextDecoder('utf-8').decode(bytes2);
      } catch(e) {}
    }
    const { step1, step2, birth, chartSummary } = JSON.parse(decoded);

    // Pass decade cards to window for LAM advice lookup
    window._s5DecadeCards = step2?.s5?.decadeCards || [];

    const html = buildBlueprint(step1, step2, birth, chartSummary);
    document.getElementById('blueprintRoot').innerHTML = html;

    // Render Financial Activation Windows + Turning Point card
    (function() {
      const timing = chartSummary && chartSummary.moneyEngine && chartSummary.moneyEngine.wealthTiming;

      function labelToTitle(type, label) {
        var map = {
          'output_to_wealth_flow':     'Creative Income Window',
          'opportunistic_wealth_year': 'Opportunity Window',
          'structured_wealth_year':    'Stable Income Expansion',
          'major_wealth_cycle':        'Peak Wealth Cycle',
          'wealth_activation':         'Financial Activation Window',
        };
        return map[type] || label || 'Financial Opportunity Window';
      }

      // ── Turning Point card (primary window) ──
      const tyEl = document.getElementById('turningYear');
      const tlEl = document.getElementById('turningLabel');
      if (tyEl && timing && timing.length) {
        const primary = timing.slice().sort((a,b) => b.score - a.score)[0];
        const yearStr = primary.endYear && primary.endYear !== primary.year
          ? `${primary.year}–${primary.endYear}` : `${primary.year}`;
        tyEl.textContent = yearStr;
        if (tlEl) tlEl.textContent = labelToTitle(primary.type, primary.label);
      }


    })();

    // Render Life Activation Map — requestAnimationFrame으로 DOM paint 후 실행 보장
    if (chartSummary && chartSummary.lamData && chartSummary.lamData.length) {
      var _lamData = chartSummary.lamData;
      requestAnimationFrame(function() {
        try { renderLifeActivationMap(_lamData); }
        catch(e) { console.error('LAM render error:', e); }
      });
    } else {
      var gw = document.getElementById('lamGraphWrap');
      var ld = document.getElementById('lamDecades');
      if (gw) gw.style.display = 'none';
      if (ld) ld.style.display = 'none';
    }

    // s3 카드 렌더링 (step2에서 직접 접근)
    (function() {
      var s3 = step2 && step2.s3 ? step2.s3 : {};
      function getS3(key) {
        var v = s3[key];
        return (v !== undefined && v !== null && v !== '') ? String(v) : '';
      }

      function renderS3Cards(elId, text, type) {
        var el = document.getElementById(elId);
        if (!el || !text) return;
        var html = '';

        if (type === 'heartbreak') {
          // 포맷: "THE TYPE THAT BREAKS YOUR HEART\nThe Dramatic Romantic\n본문\n\nTHE TYPE THAT LOVES YOU RIGHT\nThe Reliable Planner\n본문"
          function parseHBPart(raw) {
            // 첫 줄이 타이틀(짧고 마침표 없음), 나머지 본문
            var lines = raw.replace(/^[\s\n:\-]+/, '').trim().split('\n').filter(function(l){ return l.trim(); });
            if (lines.length >= 2 && lines[0].length < 60 && !lines[0].endsWith('.')) {
              return { title: lines[0].trim(), body: lines.slice(1).join(' ').trim() };
            }
            // 타이틀 없이 그냥 본문만
            return { title: '', body: lines.join(' ').trim() };
          }

          var breakIdx = text.search(/THE TYPE THAT BREAKS YOUR HEART/i);
          var lovesIdx = text.search(/THE TYPE THAT LOVES YOU RIGHT/i);
          if (breakIdx > -1 && lovesIdx > -1) {
            var breakRaw = text.slice(breakIdx + 'THE TYPE THAT BREAKS YOUR HEART'.length, lovesIdx);
            var lovesRaw = text.slice(lovesIdx + 'THE TYPE THAT LOVES YOU RIGHT'.length);
            var bp = parseHBPart(breakRaw);
            var lp = parseHBPart(lovesRaw);
            html += '<div class="s3-heartbreak-label">The Type That Breaks Your Heart</div>';
            if (bp.title) html += '<div class="s3-ln-title">' + bp.title + '</div>';
            html += '<div class="s3-heartbreak-body">' + bp.body + '</div>';
            html += '<div class="s3-heartbreak-label" style="margin-top:24px">The Type That Loves You Right</div>';
            if (lp.title) html += '<div class="s3-ln-title">' + lp.title + '</div>';
            html += '<div class="s3-heartbreak-body">' + lp.body + '</div>';
          } else {
            html = '<div class="s3-heartbreak-body">' + text + '</div>';
          }
          el.innerHTML = html;
          return;
        }

        if (type === 'timing') {
          var parts = text.split(/(?=Attraction Windows|Commitment Window|Overall)/g).filter(Boolean);
          html = parts.map(function(part) {
            var di = part.indexOf(' -- ');
            if (di > -1) {
              return '<div class="s3-trait-card"><div class="s3-trait-title">' + part.slice(0,di).trim() + '</div><div class="s3-trait-body">' + part.slice(di+4).trim() + '</div></div>';
            }
            return '<div class="s3-trait-card"><div class="s3-trait-body">' + part.trim() + '</div></div>';
          }).join('');
          el.innerHTML = html;
          return;
        }

        // redflag: TITLE\n본문 단일 카드
        var rfLines = text.split('\n').filter(function(l){ return l.trim(); });
        var rfTitle = '';
        var rfBodyParts = [];
        if (rfLines.length >= 2 && rfLines[0].length < 60 && !rfLines[0].endsWith('.')) {
          rfTitle = rfLines[0].trim();
          rfBodyParts = rfLines.slice(1);
        } else {
          rfBodyParts = rfLines;
        }
        var rfBody = rfBodyParts.join(' ').trim();
        html = '<div class="s3-redflag-card">' +
          (rfTitle ? '<div class="s3-redflag-title">⚠ ' + rfTitle + '</div>' : '') +
          '<div class="s3-redflag-body">' + rfBody + '</div>' +
          '</div>';
        el.innerHTML = html || '<div class="s3-redflag-body">' + text + '</div>';
      }

      // Love Nature: TITLE\n본문 형태 렌더링
      (function() {
        var el = document.getElementById('s3LoveNature');
        if (!el) return;
        var text = getS3('loveNature');
        if (!text) return;
        var lines = text.split('\n').filter(function(l){ return l.trim(); });
        var html = '';
        if (lines.length >= 2 && lines[0].length < 60 && !lines[0].endsWith('.')) {
          html = '<div class="s3-ln-title">' + lines[0] + '</div>' +
                 '<div class="s3-body">' + lines.slice(1).join(' ') + '</div>';
        } else {
          html = '<div class="s3-body">' + text + '</div>';
        }
        el.innerHTML = html;
      })();

      renderS3Cards('s3RedFlagCards',    getS3('redFlagPattern'),  'redflag');
      renderS3Cards('s3HeartbreakCards', getS3('heartbreakPattern'), 'heartbreak');
      renderS3Cards('s3TimingBody',      getS3('timingBody'), 'timing');
    })();

    initStars();
    initReveal();

    trackEvent('report_viewed');

    const ls = document.getElementById('loadingScreen');
    ls.style.transition = 'opacity 0.6s';
    ls.style.opacity = '0';
    setTimeout(() => { ls.style.display = 'none'; }, 650);

    document.getElementById('pdfBar').style.display = 'flex'; alignPdfBar();
  } catch (err) {
    document.getElementById('loadingScreen').innerHTML = `
      <div style="text-align:center;padding:40px;font-family:'EB Garamond',serif">
        <div style="font-size:32px;margin-bottom:16px">✦</div>
        <div style="color:#e8dfc8;font-size:20px;margin-bottom:12px">Result not found</div>
        <div style="color:rgba(232,223,200,0.5);font-size:15px;margin-bottom:32px">This link may have expired. Please contact support.</div>
        <a href="/" style="color:#c9a84c;font-size:14px;letter-spacing:2px">← Back to Home</a>
      </div>`;
  }
}

loadResult();




// ── Align pdf-bar-inner to exactly match .page width & left offset
function alignPdfBar() {
  var bar = document.getElementById('pdfBar');
  if (!bar || bar.style.display === 'none') return;
  var page = document.querySelector('.page');
  if (!page) return;
  var r = page.getBoundingClientRect();
  var inner = bar.querySelector('.pdf-bar-inner');
  if (!inner) return;
  inner.style.width = r.width + 'px';
  inner.style.marginLeft = r.left + 'px';
  inner.style.marginRight = 'auto';
}
window.addEventListener('resize', alignPdfBar);

// ── Feedback: 스크롤 끝 자동 노출
(function() {
  var shown = false;
  function showFeedback() {
    if (shown) return;
    shown = true;
    var fb = document.getElementById('feedbackSection');
    if (fb) fb.classList.add('visible');
  }

  // closing quote 섹션 감지 (feedback 바로 위)
  function checkScroll() {
    var closing = document.querySelector('.closing');
    if (!closing) return;
    var rect = closing.getBoundingClientRect();
    // closing 섹션 하단이 화면 안에 들어오면 피드백 노출
    if (rect.bottom < window.innerHeight + 50) {
      showFeedback();
      window.removeEventListener('scroll', checkScroll);
    }
  }

  window.addEventListener('scroll', checkScroll, { passive: true });
  // 이미 스크롤된 상태일 수 있으니 즉시도 체크
  setTimeout(checkScroll, 500);
})();

// ── Feedback 제출
async function submitFeedback() {
  var text = (document.getElementById('feedbackText') || {}).value || '';
  text = text.trim();
  if (!text) return;

  var btn = document.getElementById('feedbackSubmit');
  var thanks = document.getElementById('feedbackThanks');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

  try {
    var reportId = sessionStorage.getItem('saju_report_id') || '';
    var resp = await fetch('/api/submit-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reportId: reportId, feedback: text })
    });
    if (resp.ok) {
      if (thanks) thanks.style.display = 'block';
      if (btn) btn.style.display = 'none';
      var ta = document.getElementById('feedbackText');
      if (ta) ta.style.display = 'none';
    } else {
      throw new Error('Failed');
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Send Feedback'; }
    alert('Could not send feedback. Please try again.');
  }
}

function toggleSnap(el) {
  el.parentElement.classList.toggle('open');
}
