<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무료 만세력 · 사주 명식 계산기</title>
  <link rel="canonical" href="https://sajublueprint.com/saju-chart" />
  <meta name="description" content="무료 사주 명식 계산기. 일간, 오행 분포, 신강·신약을 바로 확인하세요.">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    /* 브랜드 토큰 — sajublueprint.com 메인과 동일 */
    :root{
      --gold:#e3c08a;--gold-dim:rgba(227,192,138,0.4);--gold-faint:rgba(227,192,138,0.1);
      --plum:#1e1430;--plum-deep:#160e26;
      --card:rgba(255,255,255,0.045);--card-soft:rgba(255,255,255,0.04);
      --line:rgba(227,192,138,0.22);
      --text:#f3ecff;--text-dim:rgba(243,236,255,0.68);--text-faint:rgba(243,236,255,0.4);
      --rose:#d99fb0;--lilac:#b89fd9;--lilac-soft:#cdb8e8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: linear-gradient(168deg,#241640 0%,#33214f 30%,#46305f 58%,#5a3f73 80%,#6b4d80 100%);
      background-attachment: fixed;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 60px; color: var(--text); overflow-x: hidden; }
    /* 배경 연출 (메인과 동일) */
    #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;border-radius:50%;background:var(--lilac-soft);opacity:0;
      animation:twinkle var(--d) ease-in-out infinite var(--delay);}
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:var(--bright);transform:scale(1)}}
    .glow-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:0.5;}
    .glow-1{width:340px;height:340px;background:radial-gradient(circle,rgba(184,159,217,0.55),transparent 70%);top:-80px;right:-100px;}
    .glow-2{width:300px;height:300px;background:radial-gradient(circle,rgba(217,159,176,0.4),transparent 70%);top:40%;left:-120px;}
    .glow-3{width:260px;height:260px;background:radial-gradient(circle,rgba(227,192,138,0.3),transparent 70%);bottom:5%;right:-80px;}
    .form-card, .chart-wrap, #chart-cta { position: relative; z-index: 1; }
    .form-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 26px; padding: clamp(24px,6vw,40px) clamp(18px,5vw,36px) clamp(22px,5vw,32px);
      width: 100%; max-width: 560px; margin-bottom: 40px;
      box-shadow: 0 18px 48px rgba(20,10,40,0.28); backdrop-filter: blur(6px); }
    .form-title, .section-title { font-size: clamp(30px,8vw,38px); font-weight: 800; letter-spacing: -0.02em; color: #fff; }
    .form-title { margin-bottom: clamp(22px,5vw,30px); }
    .section-title { margin-bottom: 6px; }
    .date-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: clamp(8px,2.4vw,14px); margin-bottom: 18px; }
    .extra-row { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    label { font-size: 13px; letter-spacing: 0; color: var(--text-faint); font-weight: 700; }
    input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px; color: #fff;
      font-size: clamp(15px,4.4vw,20px); font-weight: 700; letter-spacing: 0;
      padding: clamp(13px,3.6vw,17px) clamp(8px,2.6vw,16px);
      text-align: center; outline: none; transition: border-color .2s, background .2s;
      width: 100%; min-width: 0; appearance: none; -webkit-appearance: none; }
    /* 숫자 스피너 제거 — 좁은 화면에서 폭을 잡아먹음 */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    input::placeholder { color: rgba(243,236,255,0.45); font-weight: 700; }
    input:focus, select:focus { border-color: var(--gold); background: rgba(255,255,255,0.085); }
    select option { background: rgba(255,255,255,0.05); }
        .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; }
    .seg-btn { border: 0; border-radius: 11px; padding: clamp(12px,3.4vw,15px) 0; cursor: pointer;
      background: transparent; color: var(--text-dim); font-weight: 700;
      font-size: clamp(15px,4.2vw,18px); font-family: inherit; transition: background .18s, color .18s; }
    .seg-btn.active { background: linear-gradient(180deg,#eacf9b,#d9b06a); color: #2a1c12;
      box-shadow: 0 3px 10px rgba(0,0,0,.18); }
    .time-toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; cursor: pointer; user-select: none; }
    .toggle-box { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.18); border-radius: 9px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; flex-shrink: 0; }
    .toggle-box.checked { border-color: var(--gold); background: var(--gold-faint); }
    .toggle-box svg { display: none; }
    .toggle-box.checked svg { display: block; }
    .toggle-label { font-size: clamp(15px,4.2vw,17px); color: var(--text); font-weight: 600; letter-spacing: 0; }
    .time-row { display: none; margin-bottom: 20px; }
    .time-row.visible { display: block; }
    .btn { width: 100%; margin-top: 10px; padding: clamp(16px,4.4vw,19px) 0; border: 0; border-radius: 16px;
      background: linear-gradient(180deg,#eacf9b,#d9b06a); color: #2a1c12;
      font-family: inherit; font-size: clamp(16px,4.6vw,19px); font-weight: 800; letter-spacing: 0;
      cursor: pointer; transition: filter .2s, transform .08s;
      box-shadow: 0 8px 26px rgba(217,176,106,0.28); }
    .btn:active { transform: translateY(1px); }
    .btn:hover { filter: brightness(1.05); }
    .chart-wrap { width: 100%; max-width: 820px; display: none; }
    .chart-wrap.visible { display: block; }
    .manse-root { background: var(--card); border-radius: 16px; padding: 32px 24px 60px; overflow: visible; }
    .pillars-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: clamp(10px,2.6vw,14px); align-items: stretch; padding-top: 10px; }
    .pillar-card { background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: clamp(16px,4vw,22px) clamp(10px,3vw,16px) clamp(18px,4vw,24px);
      display: flex; flex-direction: column; align-items: center; position: relative;
      transition: border-color .2s, background .2s; cursor: pointer; }
    .pillar-card:hover { border-color: var(--gold-dim); background: rgba(255,255,255,0.07); }
    .pillar-label { font-size: clamp(12px,3.2vw,14px); letter-spacing: 0; color: var(--text-dim); margin-bottom: clamp(12px,3vw,16px); font-weight: 700; text-align: center; }
    .pillar-label.gold { color: var(--gold); }
    .pillar-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.09); margin: clamp(14px,3.4vw,18px) 0; }
    .energy-icon { font-size: 22px; line-height: 1; margin-bottom: 8px; display: block; text-align: center; }
    .ten-god-badge { display: inline-block; font-size: clamp(11px,2.9vw,12.5px); letter-spacing: 0; font-weight: 700; padding: 4px 11px; border-radius: 20px; margin-bottom: 9px; }
    .elem-name { font-size: clamp(17px,4.6vw,21px); font-weight: 800; line-height: 1.15; margin-bottom: 7px; text-align: center; letter-spacing: -0.01em; }
    .elem-desc { font-size: clamp(11.5px,3vw,13px); color: var(--text-dim); line-height: 1.55; font-style: normal; text-align: center; word-break: keep-all; }
    .branch-name { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 16px; font-weight: 500; line-height: 1.2; margin-bottom: 5px; text-align: center; }
    .day-master-card { border-color: var(--gold) !important; background: rgba(255,255,255,0.085) !important; box-shadow: 0 0 0 1px rgba(227,192,138,0.25); }
    .day-master-card::before { content: ''; position: absolute; top: -3px; left: 50%; transform: translateX(-50%); width: 74px; height: 5px; border-radius: 3px; background: var(--gold); }
    .el-wood { color: #5db87a; } .el-fire { color: #e07a4a; } .el-metal { color: #a0b8c8; } .el-earth { color: #c8a85a; } .el-water { color: #5888cc; }
    .bg-wood { background: rgba(93,184,122,0.12); color: #5db87a; } .bg-fire { background: rgba(224,122,74,0.12); color: #e07a4a; } .bg-metal { background: rgba(160,184,200,0.12); color: #a0b8c8; } .bg-earth { background: rgba(200,168,90,0.12); color: #c8a85a; } .bg-water { background: rgba(88,136,204,0.12); color: #5888cc; }
    .strength-section { margin-top: 28px; padding: 0 4px; }
    .strength-track-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 12px; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    .strength-slider-wrap { position: relative; margin-bottom: 8px; }
    .strength-slider-bg { width: 100%; height: 4px; background: var(--line); border-radius: 2px; position: relative; overflow: visible; }
    .strength-slider-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #3a6ecc 0%, #5888cc 100%); transition: width 0.7s cubic-bezier(.4,0,.2,1); }
    .strength-slider-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; border-radius: 50%; background: #5888cc; border: 2.5px solid var(--card-soft); box-shadow: 0 0 0 3px #5888cc33; transition: left 0.7s cubic-bezier(.4,0,.2,1); pointer-events: none; }
        .strength-scale { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; margin-top: 10px; }
    .strength-step { text-align: center; font-size: clamp(9.5px,2.5vw,11.5px); font-weight: 600;
      color: rgba(243,236,255,0.32); line-height: 1.25; word-break: keep-all; transition: color .3s; }
    .strength-step.on { color: #fff; font-weight: 800; }
    .strength-ends { display: flex; justify-content: space-between; margin-top: 6px; }
    .strength-end-left { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #5888cc; font-weight: 500; }
    .strength-end-right { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); }
    .strength-name { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 22px; font-weight: 400; color: #5888cc; text-align: center; margin-top: 16px; letter-spacing: 0.02em; }
    .strength-desc-txt { font-size: 11px; color: #5a7080; text-align: center; margin-top: 4px; font-style: italic; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    /* ── 하단 CTA ── */
    .cta-panel { position: relative; box-sizing: border-box;
      width: 100%; max-width: 402px; margin: 0 auto;
      background: transparent; padding: 56px 4px 24px; text-align: center;
      display: flex; flex-direction: column; align-items: center; }
    .cta-emoji { font-size: 40px; line-height: 1; margin-bottom: 22px; }
    .cta-head { font-size: clamp(26px,7vw,32px); font-weight: 800; color: #fff;
      letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 18px; }
    .cta-body { font-size: clamp(14px,3.8vw,16px); color: rgba(243,236,255,0.72);
      line-height: 1.75; margin-bottom: 34px; word-break: keep-all; }
    .cta-btn { width: 100%; padding: 20px 0; border: 0; border-radius: 16px;
      background: linear-gradient(180deg,#eacf9b,#d9b06a); color: #2a1c12;
      font-family: inherit; font-size: clamp(16px,4.4vw,18px); font-weight: 800; letter-spacing: 0;
      cursor: pointer; transition: filter .2s, transform .08s;
      box-shadow: 0 10px 30px rgba(217,176,106,0.3); }
    .cta-btn:hover { filter: brightness(1.05); }
    .cta-btn:active { transform: translateY(1px); }
    .legend-row { display: flex; justify-content: center; gap: 14px; margin-top: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 9.5px; color: var(--text-faint); letter-spacing: 0.08em; }
    .legend-dot { width: 6px; height: 6px; border-radius: 50%; }
    .pentagon-section { margin-top: 36px; padding: 0 4px 40px; overflow: visible; }
    .pentagon-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    .pentagon-svg-wrap { display: flex; justify-content: center; }
    .pentagon-legend { display: flex; justify-content: center; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
    .pentagon-legend-item { display: flex; align-items: center; gap: 6px; font-size: 9px; letter-spacing: 0.1em; color: var(--text-faint); }
    .pentagon-legend-line { width: 18px; height: 2px; border-radius: 1px; }
    .chart-hint { text-align: center; font-size: 11px; color: var(--text-faint); font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; letter-spacing: 0.04em; margin: 10px 0 20px; }
    @media (max-width: 600px) { .extra-row { grid-template-columns: 1fr; } }
    .annual-section { margin-top: 40px; padding: 0 4px 20px; }
    .annual-title { font-size: clamp(30px,8vw,38px); font-weight: 800; letter-spacing: -0.02em; color: #fff; margin-bottom: 6px; }
    .annual-desc { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 28px; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    .annual-group { margin-bottom: 28px; }
    .annual-group-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 12px; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; display: flex; align-items: center; gap: 10px; }
    .annual-group-label::after { content: ''; flex: 1; height: 0.5px; background: var(--gold)22; }
    .annual-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; -ms-overflow-style: none; }
    .annual-scroll::-webkit-scrollbar { display: none; }
    .annual-card { flex: 0 0 88px; background: var(--card-soft); border: 0.5px solid var(--line); border-radius: 10px; padding: 10px 8px 12px; display: flex; flex-direction: column; align-items: center; position: relative; transition: border-color 0.2s; cursor: default; }
    .annual-card:hover { border-color: var(--gold-dim); }
    .annual-card.current-year { border-color: var(--gold) !important; background: rgba(255,255,255,0.075) !important; }
    .annual-card.current-year::before { content: 'Now'; position: absolute; top: -9px; left: 50%; transform: translateX(-50%); font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; background: var(--gold); color: var(--card); padding: 2px 7px; border-radius: 8px; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-weight: 500; white-space: nowrap; }
    .annual-year { font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 8px; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-weight: 500; }
    .annual-stem-block { text-align: center; width: 100%; margin-bottom: 6px; }
    .annual-stem-icon { font-size: 18px; line-height: 1; display: block; margin-bottom: 4px; }
    .annual-stem-name { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12.5px; font-weight: 500; line-height: 1.2; }
    .annual-divider { width: 100%; height: 0.5px; background: var(--line); margin: 6px 0; }
    .annual-branch-block { text-align: center; width: 100%; }
    .annual-branch-icon { font-size: 16px; line-height: 1; display: block; margin-bottom: 4px; }
    .annual-branch-name { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 10px; line-height: 1.3; }
  </style>
</head>
<body>

<div id="stars"></div>
<div class="glow-orb glow-1"></div><div class="glow-orb glow-2"></div><div class="glow-orb glow-3"></div>

<div class="form-card">
  <div class="form-title">만세력</div>
  <div class="date-row">
    <div class="form-group"><label>월</label><input type="number" id="inp-month" placeholder="월" min="1" max="12" /></div>
    <div class="form-group"><label>일</label><input type="number" id="inp-day" placeholder="일" min="1" max="31" /></div>
    <div class="form-group"><label>년</label><input type="number" id="inp-year" placeholder="연도" min="1900" max="2025" /></div>
  </div>
  <div class="extra-row">
    <div class="form-group">
      <label>성별</label>
      <div class="seg" id="seg-gender">
        <button type="button" class="seg-btn" data-v="male" onclick="setGender('male')">남자</button>
        <button type="button" class="seg-btn active" data-v="female" onclick="setGender('female')">여자</button>
      </div>
      <input type="hidden" id="inp-gender" value="female" />
    </div>
    <!-- 표준시: 한국(KST, UTC+9) 고정 — 입력 제거 -->
  </div>
  <div class="time-toggle" onclick="toggleTime()">
    <div class="toggle-box" id="time-toggle-box">
      <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
        <path d="M1 3.5L4 6.5L10 1" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="toggle-label">태어난 시각을 알아요</span>
  </div>
  <div class="time-row" id="time-row">
    <div class="form-group"><label>태어난 시각</label><input type="time" id="inp-time" value="12:00" /></div>
  </div>
  <button class="btn" onclick="generateChart()">✦ 만세력 보러가기</button>
</div>

<div class="chart-wrap" id="chart-wrap">
  <div class="manse-root">
    <!-- Four Pillars section -->
    <div style="margin-bottom:6px;">
      <div class="section-title">사주 명식</div>
    </div>
    <div class="pillars-grid" id="pillars-grid"></div>

    <div class="strength-section">
      <div class="strength-track-label">일간의 힘 (신강·신약)</div>
      <div class="strength-slider-wrap">
        <div class="strength-slider-bg">
          <div class="strength-slider-fill" id="strength-bar" style="width:50%"></div>
          <div class="strength-slider-thumb" id="strength-thumb" style="left:50%"></div>
        </div>
      </div>
      <div class="strength-scale" id="strength-scale"></div>
      <div class="strength-name" id="strength-name"></div>
      <div class="strength-desc-txt" id="strength-val"></div>
    </div>

    <!-- Five Elements section -->
    <div class="pentagon-section">
      <div style="margin-bottom:4px;">
        <div class="section-title">오행 균형</div>
      </div>
      <div class="pentagon-svg-wrap">
        <svg id="pentagon-svg" width="360" height="340" viewBox="0 0 360 340" style="cursor:pointer;"></svg>
      </div>
      <!-- pentagon category badges rendered by JS into #pentagon-badges -->
      <div id="pentagon-badges" style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:16px;"></div>
      <div class="pentagon-legend" style="margin-top:12px;">
        <div class="pentagon-legend-item"><div class="pentagon-legend-line" style="background:#5888cc"></div>상생(相生)</div>
        <div class="pentagon-legend-item"><div class="pentagon-legend-line" style="background:#c85a5a"></div>상극(相剋)</div>
      </div>
    </div>

    <!-- Annual Flow section -->
    <div class="annual-section">
      <div class="annual-title">연운 흐름</div>
      <div class="annual-desc">해마다 들어오는 기운의 변화</div>
      <div class="annual-group">
        <div class="annual-group-label">지난 10년</div>
        <div class="annual-scroll" id="annual-past"></div>
      </div>
      <div class="annual-group">
        <div class="annual-group-label">앞으로 10년</div>
        <div class="annual-scroll" id="annual-future"></div>
      </div>
    </div>
    <div style="text-align:center;padding:24px 0 8px;border-top:0.5px solid var(--line);margin-top:32px;">
      <span style="font-size:9px;letter-spacing:0.16em;color:var(--text-faint);font-family:'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;">© 2026 Everly. All rights reserved.</span>
    </div>
  </div>
  <div id="chart-cta" style="display:none;width:100%;max-width:820px;margin-top:2px;">

  // find closest year in JIEQI
  const years = Object.keys(JIEQI).map(Number).sort((a,b)=>a-b);

  let result = 11;
  for (let i = 0; i < 12; i++) {
    const [jm, jd, jh] = data[i];
    if (month > jm || (month===jm && day > jd) || (month===jm && day===jd && hour >= jh)) result = i;
  }
  return JIEQI_MONTH_DZ[result];
}

function calcSaju(year, month, day, hour) {
  const years = Object.keys(JIEQI).map(Number).sort((a,b)=>a-b);
  let yr = years[0];
  for (const y of years) { if (y <= year) yr = y; }
  const jd = JIEQI[yr] || JIEQI[2000];
  const [lm,ld,lh] = jd[1];
  const beforeLichun = month<lm||(month===lm&&day<ld)||(month===lm&&day===ld&&hour<lh);
  const ay = beforeLichun ? year-1 : year;
  const yrTG = ((ay-4)%10+10)%10;
  const yrDZ = ((ay-4)%12+12)%12;
  const monthDZ = getMonthDZ(year, month, day, hour);
  const dzOff = {2:0,3:1,4:2,5:3,6:4,7:5,8:6,9:7,10:8,11:9,0:10,1:11};
  const monthTG = (([2,4,6,8,10,2,4,6,8,10][yrTG]) + dzOff[monthDZ]) % 10;
  const delta = Math.round((new Date(year,month-1,day)-new Date(2000,0,1))/86400000);
  const dayTG = ((4+delta)%10+10)%10;
  const dayDZ = ((6+delta)%12+12)%12;
  const hourDZ = Math.floor((hour+1)/2)%12;
  const hourTG = (([0,2,4,6,8,0,2,4,6,8][dayTG])+hourDZ)%10;
  return {yrTG,yrDZ,monthTG,monthDZ,dayTG,dayDZ,hourTG,hourDZ};
}

function calcStrength(pillars, dayTG) {
  const dayElem = TG_ELEM[dayTG];
  const genBy = {Fire:'Wood',Earth:'Fire',Metal:'Earth',Water:'Metal',Wood:'Water'};
  const sup = genBy[dayElem];
  const BW=[8,35,18,12], SW={0:10,1:10,3:10};
  let s=0,d=0;
  pillars.forEach(([tg,dz],i)=>{
    if(i!==2){const w=SW[i]||10;(TG_ELEM[tg]===dayElem||TG_ELEM[tg]===sup)?s+=w:d+=w;}
    const bw=BW[i]||8;(DZ_ELEM[dz]===dayElem||DZ_ELEM[dz]===sup)?s+=bw:d+=bw;
    const m=DZ_MAIN_TG[dz];if(m>=0){const hw=Math.round(bw*0.5);(TG_ELEM[m]===dayElem||TG_ELEM[m]===sup)?s+=hw:d+=hw;}
  });
  const label=s>=80?'극왕':s>=70?'태강':s>=60?'신강':s>=52?'중화신강':s>=45?'중화신약':s>=35?'신약':s>=25?'태약':'극약';
  return {total:s,label};
}

function getTenGod(dayTG, tg) {
  const dE=TG_ELEM[dayTG],dY=TG_YY[dayTG],tE=TG_ELEM[tg],tY=TG_YY[tg];
  const gen={Wood:'Fire',Fire:'Earth',Earth:'Metal',Metal:'Water',Water:'Wood'};
  const ctrl={Wood:'Earth',Fire:'Metal',Earth:'Water',Metal:'Wood',Water:'Fire'};
  const genBy={Fire:'Wood',Earth:'Fire',Metal:'Earth',Water:'Metal',Wood:'Water'};
  const ctrlBy={Earth:'Wood',Metal:'Fire',Water:'Earth',Wood:'Metal',Fire:'Water'};
  if(tE===dE) return tY===dY?'비견':'겁재';
  if(gen[dE]===tE) return tY===dY?'식신':'상관';
  if(ctrl[dE]===tE) return tY!==dY?'정재':'편재';
  if(ctrlBy[dE]===tE) return tY!==dY?'정관':'편관';
  if(genBy[dE]===tE) return tY!==dY?'정인':'편인';
  return '비견';
}

const PENT_KO = { Wood:'목 木', Fire:'화 火', Earth:'토 土', Metal:'금 金', Water:'수 水' };
const PENT_ANGLES = [-90, -90+72, -90+144, -90+216, -90+288];

function pentPoint(cx, cy, r, angleDeg) {
  const a = angleDeg * Math.PI / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

function calcElements(pillars) {
  const W = {Wood:0,Fire:0,Earth:0,Metal:0,Water:0};
  pillars.forEach(([tg,dz]) => { W[TG_ELEM[tg]] += 1; W[DZ_ELEM[dz]] += 1; });
  const total = Object.values(W).reduce((a,b)=>a+b,0);
  if (total > 0) Object.keys(W).forEach(k => { W[k] = Math.round((W[k]/total)*100); });
  return W;
}

function calcArrows(elems) {
  const GEN  = {Wood:'Fire',Fire:'Earth',Earth:'Metal',Metal:'Water',Water:'Wood'};
  const CTRL = {Wood:'Earth',Earth:'Water',Water:'Fire',Fire:'Metal',Metal:'Wood'};
  const THRESH = 8;
  const arrows = [];
  for (const A of Object.keys(elems)) {
    for (const B of Object.keys(elems)) {
      if (A===B) continue;
      if (elems[A]<THRESH || elems[B]<THRESH) continue;
      const power = Math.min(elems[A], elems[B]);
      if (GEN[A]===B)  arrows.push({from:A,to:B,type:'generate',strength:power});
      if (CTRL[A]===B) arrows.push({from:A,to:B,type:'control',strength:power});
    }
  }
  arrows.sort((a,b)=>b.strength-a.strength);
  return arrows.slice(0,5).map(a => ({...a, weight: a.strength>25?3:a.strength>12?2:1.5, color: a.type==='generate'?'#5888cc':'#c85a5a'}));
}

function getSipseongGroup(dayElem, nodeElem) {
  const gen    = {Wood:'Fire',Fire:'Earth',Earth:'Metal',Metal:'Water',Water:'Wood'};
  const ctrl   = {Wood:'Earth',Fire:'Metal',Earth:'Water',Metal:'Wood',Water:'Fire'};
  const genBy  = {Fire:'Wood',Earth:'Fire',Metal:'Earth',Water:'Metal',Wood:'Water'};
  const ctrlBy = {Earth:'Wood',Metal:'Fire',Water:'Earth',Wood:'Metal',Fire:'Water'};
  if (nodeElem===dayElem)         return '비겁';
  if (gen[dayElem]===nodeElem)    return '식상';
  if (ctrl[dayElem]===nodeElem)   return '재성';
  if (ctrlBy[dayElem]===nodeElem) return '관성';
  if (genBy[dayElem]===nodeElem)  return '인성';
  return '';
}

function renderPentagon(pillars, dayTG) {
  const elems  = calcElements(pillars);
  const arrows = calcArrows(elems);
  const svg    = document.getElementById('pentagon-svg');
  svg.innerHTML = '';
  const dayElem = TG_ELEM[pillars[2][0]];
  const cx=180, cy=165, R=118, nodeR=56;
  const ns = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, parent) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
    (parent||svg).appendChild(e); return e;
  }
  const nodes = {};
  PENT_ORDER.forEach((name,i) => { nodes[name] = pentPoint(cx,cy,R,PENT_ANGLES[i]); });
  arrows.forEach(a => {
    const from=nodes[a.from], to=nodes[a.to];
    const dx=to.x-from.x, dy=to.y-from.y, len=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/len, uy=dy/len;
    const x1=from.x+ux*nodeR, y1=from.y+uy*nodeR;
    const x2=to.x-ux*(nodeR+4), y2=to.y-uy*(nodeR+4);
    const mid=`arr-${a.from}-${a.to}`;
    const defs=svg.querySelector('defs')||el('defs',{});
    const marker=el('marker',{id:mid,markerWidth:'8',markerHeight:'8',refX:'6',refY:'3',orient:'auto'},defs);
    el('path',{d:'M0,0 L0,6 L8,3 z',fill:a.color},marker);
    el('line',{x1,y1,x2,y2,stroke:a.color,'stroke-width':a.weight,'stroke-opacity':'0.7','marker-end':`url(#${mid})`});
  });
  PENT_ORDER.forEach(name => {
    const pt=nodes[name], pct=elems[name], col=ELEM_COLORS[name];
    const sip=getSipseongGroup(dayElem,name);
    const g=el('g',{style:'cursor:pointer;'});
    // click → open guide focused on this category
    g.addEventListener('click', () => openGuide(SIP_TO_GUIDE[sip] || null, true));
    el('circle',{cx:pt.x,cy:pt.y,r:nodeR,fill:'var(--card-soft)',stroke:col.stroke,'stroke-width':'1',opacity:'0.9'},g);
    if (pct>0) {
      const fillH=Math.min((pct/100)*nodeR*2,nodeR*2), fillY=pt.y+nodeR-fillH;
      const clipId=`clip-${name}`;
      const defs2=svg.querySelector('defs')||el('defs',{});
      const cp=el('clipPath',{id:clipId},defs2);
      el('circle',{cx:pt.x,cy:pt.y,r:nodeR-1},cp);
      el('rect',{x:pt.x-nodeR,y:fillY,width:nodeR*2,height:fillH,fill:col.stroke,opacity:'0.2','clip-path':`url(#${clipId})`},g);
    }
    el('circle',{cx:pt.x,cy:pt.y,r:nodeR,fill:'none',stroke:col.stroke,'stroke-width':pct===0?'0.5':'1.5'},g);
    el('text',{x:pt.x,y:pt.y-22,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Pretendard Variable, Pretendard, -apple-system, system-ui, sans-serif','font-size':'12','font-weight':'500',fill:pct===0?'var(--text-faint)':col.text,'letter-spacing':'0.5'},g).textContent=(typeof PENT_KO!=='undefined'&&PENT_KO[name])||name;
    el('text',{x:pt.x,y:pt.y-8,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Pretendard Variable, Pretendard, -apple-system, system-ui, sans-serif','font-size':'8',fill:pct===0?'var(--text-faint)':'#ffffff55','letter-spacing':'0.08em'},g).textContent=sip;
    el('text',{x:pt.x,y:pt.y+8,'text-anchor':'middle','dominant-baseline':'middle','font-family':"'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif",'font-size':'15',fill:pct===0?'var(--text-faint)':col.text},g).textContent=pct===0?'—':pct+'%';
    if(pct===0) el('text',{x:pt.x,y:pt.y+22,'text-anchor':'middle','font-family':'Pretendard Variable, Pretendard, -apple-system, system-ui, sans-serif','font-size':'8',fill:'var(--text-faint)','letter-spacing':'0.12em'},g).textContent='없음';
  });
}

// ── ANNUAL FLOW ──
const ANNUAL_STEM = {
  Wood: { Yang: { icon: '🌳', name: '갑목' }, Yin: { icon: '🌿', name: '을목' } },
  Fire: { Yang: { icon: '🔆', name: '병화' }, Yin: { icon: '🕯️', name: '정화' } },
  Earth:{ Yang: { icon: '⛰️', name: '무토' }, Yin: { icon: '🌾', name: '기토' } },
  Metal:{ Yang: { icon: '⚔️', name: '경금' }, Yin: { icon: '💎', name: '신금' } },
  Water:{ Yang: { icon: '🌊', name: '임수' }, Yin: { icon: '💧', name: '계수' } },
};
const ANNUAL_BRANCH = [
  { icon: '🐀', name: '자' }, { icon: '🐂', name: '축' }, { icon: '🐯', name: '인' }, { icon: '🐇', name: '묘' },
  { icon: '🐉', name: '진' }, { icon: '🐍', name: '사' }, { icon: '🐎', name: '오' }, { icon: '🐐', name: '미' },
  { icon: '🐒', name: '신' }, { icon: '🐓', name: '유' }, { icon: '🐕', name: '술' }, { icon: '🐗', name: '해' },
];
const ELEM_KO = { Wood:'목', Fire:'화', Earth:'토', Metal:'금', Water:'수' };
const ANNUAL_ELEM_COLOR = { Wood:'#5db87a', Fire:'#e07a4a', Earth:'#c8a85a', Metal:'#a0b8c8', Water:'#5888cc' };

function getYearPillar(year) {
  const tg = ((year - 4) % 10 + 10) % 10;
  const dz = ((year - 4) % 12 + 12) % 12;
  return { tg, dz };
}

function renderAnnualFlow(dayTG) {
  const currentYear = 2026;
  const pastYears   = Array.from({ length: 10 }, (_, i) => currentYear - 10 + i);
  const futureYears = Array.from({ length: 10 }, (_, i) => currentYear + i);
  function buildCard(year) {
    const { tg, dz } = getYearPillar(year);
    const elem = TG_ELEM[tg], yy = TG_YY[tg];
    const sd = ANNUAL_STEM[elem][yy], bd = ANNUAL_BRANCH[dz];
    const branchElem = DZ_ELEM[dz];
    const branchElemKo = ELEM_KO[branchElem] || branchElem;
    const isNow = year === currentYear;
    const sc = ANNUAL_ELEM_COLOR[elem], bc = ANNUAL_ELEM_COLOR[branchElem];
    const card = document.createElement('div');
    card.className = 'annual-card' + (isNow ? ' current-year' : '');
    card.style.borderColor = isNow ? 'var(--gold)' : sc + '55';
    card.innerHTML = `<div class="annual-year">${year}</div><div class="annual-stem-block"><span class="annual-stem-icon">${sd.icon}</span><div class="annual-stem-name" style="color:${sc}">${sd.name}</div></div><div class="annual-divider" style="background:${sc}33"></div><div class="annual-branch-block"><span class="annual-branch-icon">${bd.icon}</span><div class="annual-branch-name" style="color:${bc}">${branchElemKo}<br>${bd.name}</div></div>`;
    return card;
  }
  const pastEl = document.getElementById('annual-past');
  const futureEl = document.getElementById('annual-future');
  if (!pastEl || !futureEl) return;
  pastEl.innerHTML = ''; futureEl.innerHTML = '';
  pastYears.forEach(y => pastEl.appendChild(buildCard(y)));
  futureYears.forEach(y => futureEl.appendChild(buildCard(y)));
  setTimeout(() => { pastEl.scrollLeft = pastEl.scrollWidth; }, 100);
}
